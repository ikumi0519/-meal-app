<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーデ週間ナビ 天気連動版</title>
<style>
:root {
  --bg:#f7f3f0;
  --card:#ffffff;
  --line:#e3d9d3;
  --text:#2d2a28;
  --muted:#6f6762;
  --soft:#efe7e3;
  --accent:#2d2a28;
}
* { box-sizing:border-box; }
body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
}
.wrap {
  max-width:920px;
  margin:0 auto;
  padding:16px;
}
.hero {
  background:linear-gradient(180deg,#efe5df,#fbf7f4);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}
h1 {
  margin:0 0 8px;
  font-size:30px;
  letter-spacing:.02em;
}
.sub {
  color:var(--muted);
  font-size:14px;
  line-height:1.7;
}
.panel {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.full { grid-column:1 / -1; }
label {
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:5px;
}
select,input,button {
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  font-size:15px;
  background:#fff;
  font-family:inherit;
}
button {
  background:var(--accent);
  color:#fff;
  font-weight:800;
  margin-top:10px;
}
.status {
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}
.summary {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
  line-height:1.7;
  font-size:14px;
}
.cards {
  display:grid;
  gap:16px;
}
.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.04);
}
.image_area {
  background:#eee6e0;
  padding:10px;
}
.card img {
  width:100%;
  max-height:520px;
  object-fit:contain;
  display:block;
  border-radius:16px;
  background:#f5f1ee;
}
.card_body {
  padding:14px;
}
.topline {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.day {
  font-size:24px;
  font-weight:800;
}
.score {
  font-size:12px;
  background:var(--soft);
  border:1px solid #e8dcd5;
  padding:6px 10px;
  border-radius:999px;
  white-space:nowrap;
}
.title {
  font-size:17px;
  font-weight:800;
  line-height:1.5;
  margin-bottom:4px;
}
.weather {
  color:var(--muted);
  font-size:13px;
  margin-bottom:10px;
}
.tags {
  margin-bottom:10px;
}
.tag {
  display:inline-block;
  background:var(--soft);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  margin:0 6px 6px 0;
}
.point {
  font-size:14px;
  line-height:1.7;
  color:var(--text);
  background:#faf7f5;
  border:1px solid #eee4de;
  border-radius:14px;
  padding:10px;
}
.footer {
  color:var(--muted);
  font-size:12px;
  line-height:1.7;
  margin-top:16px;
  padding-bottom:12px;
}
@media (min-width:760px) {
  .cards { grid-template-columns:repeat(2,1fr); }
  .card:first-child { grid-column:1 / -1; }
}
@media (max-width:560px) {
  .grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>コーデ週間ナビ</h1>
    <div class="sub">
      県と市を選ぶと、7日分の天気を取得してコーデを表示します。<br>
      明日から試すための天気連動版です。
    </div>
  </section>

  <section class="panel">
    <div class="grid">
      <div>
        <label for="pref">県</label>
        <select id="pref"></select>
      </div>
      <div>
        <label for="city">市</label>
        <select id="city"></select>
      </div>
      <div>
        <label for="bodyType">体型</label>
        <select id="bodyType">
          <option value="standard">標準</option>
          <option value="full">ふっくら</option>
          <option value="slim">細身</option>
        </select>
      </div>
      <div>
        <label for="taste">好み</label>
        <select id="taste">
          <option value="clean">きれいめ</option>
          <option value="casual">カジュアル</option>
          <option value="mono">モノトーン</option>
          <option value="feminine">フェミニン</option>
        </select>
      </div>
      <div class="full">
        <button onclick="generate()">天気を見て1週間コーデを作る</button>
        <div class="status" id="status">県・市を選んでボタンを押してください。</div>
      </div>
    </div>
  </section>

  <section class="summary" id="summary">
    まだ生成していません。
  </section>

  <section class="cards" id="cards"></section>

  <div class="footer">
    天気取得ができない環境では、サンプル気温で表示します。スマホのHTMLビューアーでボタンが動かない場合は、SafariやHTML実行対応アプリで開いてください。
  </div>
</div>

const DAY_JP = ["日","月","火","水","木","金","土"];

function $(id) {
  return document.getElementById(id);
}

function init() {
  const pref = $("pref");
  pref.innerHTML = Object.keys(AREA_MAP).map(p => `<option value="${p}">${p}</option>`).join("");
  pref.value = "岐阜県";
  syncCities();
  $("city").value = "関市";
  pref.addEventListener("change", syncCities);
}

function syncCities() {
  const pref = $("pref").value;
  $("city").innerHTML = AREA_MAP[pref].map(c => `<option value="${c}">${c}</option>`).join("");
}

function weatherText(code) {
  const map = {
    0:"快晴",1:"晴れ",2:"晴れ時々くもり",3:"くもり",
    45:"霧",48:"霧",51:"弱い霧雨",53:"霧雨",55:"強い霧雨",
    61:"弱い雨",63:"雨",65:"強い雨",
    71:"弱い雪",73:"雪",75:"強い雪",
    80:"にわか雨",81:"やや強いにわか雨",82:"強いにわか雨",
    95:"雷雨"
  };
  return map[code] || "天気変化あり";
}

async function geocodeCity(pref, city) {
  const q = encodeURIComponent(`${city} ${pref} Japan`);
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=10&language=ja&format=json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("位置情報を取得できません");
  const json = await res.json();
  if(!json.results || !json.results.length) throw new Error("市が見つかりません");
  const hit = json.results[0];
  return {lat:hit.latitude, lon:hit.longitude};
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=7`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("天気を取得できません");
  return await res.json();
}

function fallbackWeather() {
  const today = new Date();
  const times = [];
  for(let i=0;i<7;i++) {
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    times.push(d.toISOString().slice(0,10));
  }
  return {
    daily: {
      time: times,
      temperature_2m_max: [18,19,20,22,23,24,23],
      temperature_2m_min: [11,12,13,14,15,16,15],
      precipitation_probability_max: [30,20,10,35,15,10,20],
      weather_code: [3,2,1,2,1,1,2]
    }
  };
}

function selectLook(maxT, rain, body, taste, index) {
  if(rain >= 50) return "black_onepiece";
  if(body === "full" && taste === "clean") return index % 2 === 0 ? "black_onepiece" : "white_shirt";
  if(body === "full" && taste === "casual") return index % 2 === 0 ? "jacket_denim" : "black_denim";
  if(body === "slim" && taste === "feminine") return "flower_skirt";
  if(taste === "mono") return index % 2 === 0 ? "black_onepiece" : "black_denim";
  if(taste === "casual") return index % 2 === 0 ? "border" : "blouse_denim";
  if(taste === "feminine") return "flower_skirt";
  if(maxT <= 19) return index % 2 === 0 ? "border" : "red_knit";
  if(maxT >= 23) return index % 2 === 0 ? "blouse_denim" : "black_denim";
  return index % 2 === 0 ? "white_shirt" : "jacket_denim";
}

function outfitTitle(look) {
  const map = {
    border:"ボーダー×トレンチのきれいめコーデ",
    black_onepiece:"黒ワンピース×スカーフの細見えコーデ",
    red_knit:"赤ニット×ブラックの差し色コーデ",
    jacket_denim:"ジャケット×デニムの大人カジュアル",
    flower_skirt:"花柄スカートの華やかコーデ",
    blouse_denim:"ブラウス×デニムのきれいめ休日コーデ",
    black_denim:"黒トップス×デニムのすっきりコーデ",
    white_shirt:"白シャツ×ネイビーの上品コーデ"
  };
  return map[look];
}

function tagsFor(look, body, taste) {
  const base = {
    border:["きれいめ","春秋","パンツ"],
    black_onepiece:["細見え","上品","モノトーン"],
    red_knit:["差し色","大人","黒ベース"],
    jacket_denim:["カジュアル","デニム","軽め"],
    flower_skirt:["フェミニン","スカート","華やか"],
    blouse_denim:["休日","デニム","きれいめ"],
    black_denim:["大人カジュアル","デニム","細見え"],
    white_shirt:["通勤","上品","パンツ"]
  }[look] || [];
  if(body === "full") base.push("縦ライン");
  if(taste === "clean") base.push("きれいめ");
  return [...new Set(base)].slice(0,4);
}

function pointFor(maxT, rain, look, body) {
  if(rain >= 50) return "雨の日は足元と色味を落ち着かせると、全体がまとまりやすいです。";
  if(body === "full") return "縦ラインと締め色を意識して、すっきり見える構成を優先しています。";
  if(maxT >= 23) return "日中は暖かめなので、軽く見える素材と抜け感を優先しています。";
  if(maxT <= 19) return "朝晩の冷えに備えて、羽織りや厚みのあるアイテムを選んでいます。";
  return "気温差が大きすぎない日なので、見た目と使いやすさのバランスを優先しています。";
}

async function generate() {
  const pref = $("pref").value;
  const city = $("city").value;
  const body = $("bodyType").value;
  const taste = $("taste").value;
  $("status").textContent = "天気を取得中です...";

  let weather;
  let usedFallback = false;
  try {
    const geo = await geocodeCity(pref, city);
    weather = await fetchWeather(geo.lat, geo.lon);
  } catch(e) {
    console.log(e);
    weather = fallbackWeather();
    usedFallback = true;
  }

  const d = weather.daily;
  $("summary").innerHTML = `
    <b>今回の条件</b><br>
    地域：${pref} ${city}<br>
    体型：${$("bodyType").selectedOptions[0].textContent} / 好み：${$("taste").selectedOptions[0].textContent}<br>
    天気：${usedFallback ? "サンプル気温で表示中" : "天気APIから取得済み"}
  `;

  const cards = d.time.map((date, i) => {
    const maxT = Math.round(d.temperature_2m_max[i]);
    const minT = Math.round(d.temperature_2m_min[i]);
    const rain = d.precipitation_probability_max[i] ?? 0;
    const wtxt = weatherText(d.weather_code[i]);
    const dt = new Date(date + "T09:00:00");
    const dow = DAY_JP[dt.getDay()] + "曜日";
    const look = selectLook(maxT, rain, body, taste, i);
    const tags = tagsFor(look, body, taste).map(t => `<span class="tag">${t}</span>`).join("");
    return `
      <article class="card">
        <div class="image_area">
          <img src="${IMAGE_MAP[look]}" alt="${dow}のコーデ画像">
        </div>
        <div class="card_body">
          <div class="topline">
            <div class="day">${dow}</div>
            <div class="score">おすすめ</div>
          </div>
          <div class="title">${outfitTitle(look)}</div>
          <div class="weather">${maxT}℃ / 最低 ${minT}℃ / ${wtxt} / 降水確率 ${rain}%</div>
          <div class="tags">${tags}</div>
          <div class="point">${pointFor(maxT, rain, look, body)}</div>
        </div>
      </article>
    `;
  }).join("");

  $("cards").innerHTML = cards;
  $("status").textContent = usedFallback ? "天気取得に失敗したため、サンプル気温で表示しました。" : "天気に連動して1週間コーデを作成しました。";
}

init();
generate();
</script>
