function pickFrom(list){return list[Math.floor(Math.random()*list.length)]}
function activeTagList(){return [...activeTags];}

function score(m){
  let s=Math.random()*0.1;
  activeTagList().forEach(t=>{
    if(m.tags && m.tags.includes(t)) s+=1;
  });
  const pref=(document.getElementById("pref").value||"");
  if(pref.includes("鶏") && m.name.includes("鶏")) s+=2;
  if(pref.includes("豚") && m.name.includes("豚")) s+=2;
  if(pref.includes("和食") && m.genre==="和食") s+=1.5;
  if(pref.includes("洋食") && m.genre==="洋食") s+=1.5;
  if(pref.includes("中華") && m.genre==="中華") s+=1.5;
  if(pref.includes("節約") && (m.name.includes("豆腐")||m.name.includes("丼"))) s+=1;
  if(seasonalByMonth[new Date().getMonth()+1].some(x=>m.ingredients && m.ingredients.some(i=>i[0].includes(x)))) s+=0.8;
  return s;
}

function pickBest(list){
  if(!list || list.length===0) return null;
  return list.map(x=>({item:x,score:score(x)})).sort((a,b)=>b.score-a.score)[0].item;
}

function filteredMains(){
  const pref=(document.getElementById("pref").value||"");
  let pool=mains.filter(m=>true);
  if(pref.includes("魚なし")||activeTags.has("魚少なめ")) pool=pool.filter(m=>m.cat!=="魚");
  if(pref.includes("辛くない")) pool=pool.filter(m=>m.taste!=="辛め");
  if(pref.includes("鶏多め")) pool=pool.filter(m=>m.name.includes("鶏") || m.cat!=="魚");
  return pool.length?pool:[...mains];
}

function externalToMain(r){
  return {
    name:r.recipeTitle,
    cat:"外部",
    taste:"人気",
    genre:"楽天レシピ",
    prep:false,
    bento:false,
    tags:["楽天レシピ"],
    ingredients:[],
    steps:["楽天レシピのページで詳細を確認"],
    save:"外部レシピ参照",
    url:r.recipeUrl,
    image:r.foodImageUrl
  };
}

function recipePool(){
  return filteredMains().concat(externalRecipes.map(externalToMain));
}

function pickWeek(){
  let pool=recipePool();
  let result=[];
  let last=null;

  for(let i=0;i<5;i++){
    let list=pool.filter(m=>!last || (m.cat!==last.cat && m.taste!==last.taste && m.genre!==last.genre));
    if(list.length===0) list=[...pool];
    let pick=pickBest(list);
    if(!pick) break;
    result.push(pick);
    pool=pool.filter(m=>m.name!==pick.name);
    last=pick;
  }
  return result;
}

function pickMonth(){
  let base=recipePool();
  let result=[];
  let last=null;
  let usedNames=new Set();

  for(let w=0;w<4;w++){
    let week=[];
    for(let d=0;d<7;d++){
      let pool=base.filter(m=>!usedNames.has(m.name));
      if(pool.length===0){
        usedNames=new Set();
        pool=[...base];
      }
      let list=pool.filter(m=>!last || (m.cat!==last.cat && m.taste!==last.taste && m.genre!==last.genre));
      if(list.length===0) list=[...pool];
      let pick=pickBest(list);
      if(!pick) break;
      week.push(pick);
      usedNames.add(pick.name);
      last=pick;
    }
    result.push(week);
  }
  return result;
}

function pickSides(){
  let pool=[...sideDB];
  let result=[];
  for(let i=0;i<10;i++){
    if(pool.length===0) pool=[...sideDB];
    let pick=pickFrom(pool);
    result.push(pick);
    pool=pool.filter(s=>s.name!==pick.name);
  }
  return result;
}

function pickSnacks(){
  const freq=Number(document.getElementById("snackFreq").value)||0;
  let pool=[...snacks];
  let result=[];
  for(let i=0;i<freq;i++){
    if(pool.length===0) pool=[...snacks];
    let pick=pickFrom(pool);
    result.push(pick);
    pool=pool.filter(s=>s.name!==pick.name);
  }
  return result;
}

function addShopping(list,item,people){
  if(!item.ingredients || item.ingredients.length===0) return;
  item.ingredients.forEach(i=>{
    let key=i[0]+i[2];
    if(!list[key]) list[key]={name:i[0],amount:0,unit:i[2],cat:i[3]};
    list[key].amount+=i[1]*people;
  });
}

function fmt(n,unit){
  if(unit==="g"){
    let v=Math.ceil(n/100)*100;
    if(v>=1000)return (v/1000).toFixed(1)+"kg";
    return v+"g";
  }
  if(["個","本","丁","株","袋","切"].includes(unit)){
    if(n<=0.5)return "1/2"+unit;
    return Math.ceil(n)+unit;
  }
  if(unit==="大さじ")return Math.round(n*2)/2+"大さじ";
  return n+unit;
}

    let recipeDetail="";
    if(m.url){
      recipeDetail=`<br><a href="${m.url}" target="_blank">楽天レシピで見る</a>`;
    }else{
      recipeDetail=`
      <button onclick="toggleRecipe('r${i}')">レシピを見る</button>
      <div id="r${i}" class="recipe">
        <b>材料（${people}人分）</b><br>
        ${m.ingredients.map(x=>"・"+x[0]+" "+fmt(x[1]*people,x[2])).join("<br>")}
        <br><br>
        <b>手順</b><br>
        ${m.steps.map((s,n)=>(n+1)+". "+s).join("<br>")}
        <br><br>
        保存：${m.save}
      </div>`;
    }

    html+=`
    <b>${days[i]}</b><br>
    <span class="badge bento">弁当</span><br>
    主菜：${prepMains[i%prepMains.length].name}<br>
    副菜：${s1.name} / ${s2.name}（${bento}人）<br><br>
    <span class="badge dinner">夕飯</span><br>
    ${m.name}<br>
    <small>${m.genre} / ${m.taste} / ${m.cat}</small><br>
    ${recipeDetail}
    <br><br>
    `;
  });

  html+=`<hr>週予算：約${Math.round(budget/4)}円</div>`;

  html+="<div class='card'><h3>おやつ</h3>";
  if(snacksPicked.length===0){
    html+="なし";
  }else{
    snacksPicked.forEach((s,i)=>{
      html+="<span class='badge snack'>おやつ"+(i+1)+"</span> "+s.name+" / "+s.type+"<br>";
    });
  }
  html+="</div>";

  html+="<div class='card'><h3>1ヶ月メニュー</h3>";
  month.forEach((w,i)=>{
    html+="<b>第"+(i+1)+"週</b><br>";
    w.forEach(m=>{
      html+="・"+m.name+"<br>";
    });
    html+="<br>";
  });
  html+="</div>";

  html+="<div class='card'><h3>買い物リスト</h3>";
  ["肉","魚","野菜","卵・豆腐","調味料","その他"].forEach(cat=>{
    let items=Object.values(shopping).filter(x=>x.cat===cat);
    if(items.length){
      html+="<b>"+cat+"</b><br>";
      items.forEach(x=>{
        html+="・"+x.name+" "+fmt(x.amount,x.unit)+"<br>";
      });
      html+="<br>";
    }
  });
  html+="</div>";

  document.getElementById("out").innerHTML=html;
  document.getElementById("status").textContent="作成しました";
}

function savePlan(){
  localStorage.setItem("mealPlannerApiV4", document.getElementById("out").innerHTML);
  alert("保存しました");
}

function loadPlan(){
  const saved = localStorage.getItem("mealPlannerApiV4");
  if(saved){
    document.getElementById("out").innerHTML = saved;
  }else{
    alert("保存データがありません");
  }
}

function fetchRakutenRecipes(){
  const appId=document.getElementById("rakutenId").value.trim();
  const cat=document.getElementById("recipeCat").value;
  if(!appId){
    alert("楽天アプリIDを入力してください。未入力でも内蔵レシピでは使えます。");
    return;
  }
  document.getElementById("status").textContent="楽天レシピ取得中...";
  const callbackName="rakutenCallback_"+Date.now();
  window[callbackName]=function(data){
    try{
      externalRecipes=(data.result||[]).map(r=>({
        recipeTitle:r.recipeTitle,
        recipeUrl:r.recipeUrl,
        foodImageUrl:r.foodImageUrl
      }));
      document.getElementById("status").textContent="楽天レシピを"+externalRecipes.length+"件取得しました。作成を押してください。";
    }catch(e){
      document.getElementById("status").innerHTML='<span class="err">取得後処理エラー</span>';
    }finally{
      delete window[callbackName];
      const old=document.getElementById(callbackName);
      if(old) old.remove();
    }
  };
  const script=document.createElement("script");
  script.id=callbackName;
  script.src="https://app.rakuten.co.jp/services/api/Recipe/CategoryRanking/20170426?applicationId="+encodeURIComponent(appId)+"&categoryId="+encodeURIComponent(cat)+"&format=jsonp&callback="+callbackName;
  script.onerror=function(){
    document.getElementById("status").innerHTML='<span class="err">楽天レシピ取得に失敗しました。アプリIDか通信を確認してください。</span>';
  };
  document.body.appendChild(script);
}
</script>
