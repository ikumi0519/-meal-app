function roundHalf(n){return Math.round(n*2)/2;}
function formatAmount(value, unit){
  if(unit==="g"){ const v=Math.ceil(value/100)*100; return v>=1000 ? (v/1000).toFixed(1)+"kg" : v+"g"; }
  if(unit==="大さじ"||unit==="小さじ"){ return roundHalf(value)+unit; }
  if(["個","本","株","袋","丁","パック","カップ","片"].includes(unit)){
    if(value===0.25) return "1/4"+unit;
    if(value===0.5) return "1/2"+unit;
    if(value===0.75) return "3/4"+unit;
    return Math.ceil(value)+unit;
  }
  return value+unit;
}
function addToShopping(map, list, ratio){
  list.forEach(i=>{
    const key=i[0]+"_"+i[2];
    if(!map[key]) map[key]={name:i[0],amount:0,unit:i[2],group:i[3]||"その他"};
    map[key].amount += i[1]*ratio;
  });
}
function groupOrder(g){ return ["野菜","肉","卵","豆腐","朝食","主食","調味料","その他"].indexOf(g); }
function badgeHtml(label, cls){ return `<span class="badge ${cls}">${label}</span>`; }
function recipeBlock(item){
  return `<button class="ghost" onclick="toggleRecipe(this)" style="margin-top:8px;padding:8px 10px;background:#fff;color:#e88b5a;border:1px solid #e88b5a;width:auto">レシピを見る</button>
  <div class="recipe"><div class="small"><b>材料</b></div>${item.ing.map(x=>`・${x[0]} ${formatAmount(x[1],x[2])}`).join("<br>")}
  <div class="small" style="margin-top:8px"><b>手順</b></div>${item.steps.map((s,i)=>`${i+1}. ${s}`).join("<br>")}
  <div class="small" style="margin-top:8px">目安時間：${item.time}</div><div class="small">保存：${item.keep}</div><div class="small">一言：${item.tip}</div></div>`;
}
function toggleRecipe(btn){ const rec=btn.nextElementSibling; rec.style.display = rec.style.display==="block" ? "none" : "block"; }
function mealAllowed(item, ng){
  if(!ng) return true;
  return !item.name.includes(ng) && !item.ing.some(i=>i[0].includes(ng));
}
function scoreMeal(item){
  let s=Math.random()*0.2;
  if(activeTags.has("時短") && item.tags.includes("時短")) s+=1.2;
  if(activeTags.has("節約") && item.tags.includes("節約")) s+=1.0;
  if(activeTags.has("子ども向け") && item.tags.includes("子ども向け")) s+=1.0;
  if(activeTags.has("和食寄り") && item.tags.includes("和食寄り")) s+=0.8;
  if(activeTags.has("洋食寄り") && item.tags.includes("洋食寄り")) s+=0.8;
  if(activeTags.has("中華寄り") && item.tags.includes("中華寄り")) s+=0.8;
  if(activeTags.has("ヘルシー") && item.tags.includes("ヘルシー")) s+=0.9;
  if(activeTags.has("野菜多め") && item.tags.includes("野菜多め")) s+=1.1;
  if(activeTags.has("がっつり") && item.tags.includes("がっつり")) s+=1.1;
  if(activeTags.has("作り置き向き") && item.tags.includes("作り置き向き")) s+=0.9;
  return s;
}
function buildMonthMenu(pool){
  const month=[]; let recent=[]; let prevCat="";
  for(let w=0; w<4; w++){
    const week=[];
    for(let d=0; d<7; d++){
      let candidates=pool.filter(x=>!recent.includes(x.name) && x.cat!==prevCat);
      if(!candidates.length) candidates=pool.filter(x=>x.cat!==prevCat);
      if(!candidates.length) candidates=pool;
      candidates=candidates.map(x=>({item:x,score:scoreMeal(x)})).sort((a,b)=>b.score-a.score);
      const pick=candidates[0].item;
      week.push(pick); recent.push(pick.name); if(recent.length>8) recent.shift(); prevCat=pick.cat;
    }
    month.push(week);
  }
  return month;
}
function pickWeeklyMains(pool){
  const out=[]; const used=new Set(); let prevCat="";
  for(let i=0;i<5;i++){
    let candidates=pool.filter(x=>!used.has(x.name) && x.cat!==prevCat);
    if(!candidates.length) candidates=pool.filter(x=>!used.has(x.name));
    if(!candidates.length) candidates=pool;
    candidates=candidates.map(x=>({item:x,score:scoreMeal(x)})).sort((a,b)=>b.score-a.score);
    const pick=candidates[0].item;
    out.push(pick); used.add(pick.name); prevCat=pick.cat;
  }
  return out;
}
function makePlan(){
  const people=Number(document.getElementById("people").value)||4;
  const bentoPeople=Number(document.getElementById("bentoPeople").value)||1;
  const monthlyBudget=Number(document.getElementById("budget").value)||0;
  const snackBudget=Number(document.getElementById("snackBudget").value)||0;
  const ng=(document.getElementById("ng").value||"").trim();

  const mains2=mains.filter(x=>mealAllowed(x,ng));
  const sides2=sides.filter(x=>mealAllowed(x,ng));
  const preps2=preps.filter(x=>mealAllowed(x,ng));
  const breakfasts2=breakfasts.filter(x=>mealAllowed(x,ng));

  let total=0; let shopping={};
  const weeklyBudget=Math.round((monthlyBudget-snackBudget)/4.3);

  const monthPlan=buildMonthMenu(mains2);
  document.getElementById("month").innerHTML=`<div class="card"><h3>1ヶ月メニュー</h3>${
    monthPlan.map((week,idx)=>`<div class="month-week"><b>第${idx+1}週</b><ul>${week.map(x=>`<li>${x.name}</li>`).join("")}</ul></div>`).join("")
  }</div>`;

  let prepHtml=`<div class="card"><h3>日曜：作り置き</h3>`;
  preps2.forEach(p=>{
    prepHtml += `✔ ${p.name} <span class="small">(${p.keep})</span><br><span class="small">${p.tip}</span><br>`;
    total += p.cost; addToShopping(shopping,p.ing,1);
  });
  prepHtml += `</div>`;
  document.getElementById("prep").innerHTML=prepHtml;

  const weeklyMains=pickWeeklyMains(mains2);
  let weekHtml="";
  ["月","火","水","木","金"].forEach((day,idx)=>{
    const breakfast=breakfasts2[idx % breakfasts2.length];
    const main=weeklyMains[idx];
    const sidePool=[...sides2].sort(()=>Math.random()-0.5);
    const side1=sidePool[0];
    const side2=sidePool.find(x=>x.name!==side1.name) || sidePool[1] || side1;

    total += breakfast.cost + main.cost + side1.cost + side2.cost;
    addToShopping(shopping, breakfast.ing, people/3);
    addToShopping(shopping, main.ing, people/3);
    addToShopping(shopping, side1.ing, people/3);
    addToShopping(shopping, side2.ing, people/3);

    weekHtml += `<div class="card">
      <h3>${day}</h3>
      ${badgeHtml("朝ごはん","b-info")}<div class="mealname">${breakfast.name}</div>${recipeBlock(breakfast)}
      <div style="margin-top:10px">${badgeHtml("お弁当","b-bento")} 主菜：作り置き / 副菜①：${side1.name} / 副菜②：${side2.name} / 彩り：ミニトマト <div class="small">お弁当 ${bentoPeople}人分</div></div>
      <div style="margin-top:10px">${badgeHtml("夕飯","b-dinner")}<div class="mealname">${main.name}</div>${recipeBlock(main)}</div>
      <div style="margin-top:10px">${badgeHtml("副菜","b-side")} ${side1.name} / ${side2.name}</div>
    </div>`;
  });
  document.getElementById("week").innerHTML=weekHtml;

  const remain=weeklyBudget-total;
  document.getElementById("summary").innerHTML=`<div class="card"><div class="summary">
    ${badgeHtml("週予算目安 "+weeklyBudget.toLocaleString()+"円","b-info")}
    ${badgeHtml("今週概算 "+total.toLocaleString()+"円","b-dinner")}
    ${badgeHtml("残り "+remain.toLocaleString()+"円","b-side")}
  </div><div class="small" style="margin-top:8px">※ 調味料は概算・目安です。</div></div>`;

  const grouped=Object.values(shopping).sort((a,b)=>{
    const ga=groupOrder(a.group), gb=groupOrder(b.group);
    return ga===gb ? a.name.localeCompare(b.name,"ja") : ga-gb;
  });
  let shoppingHtml=`<div class="card"><h3>土曜：買い物リスト</h3>`;
  let current="";
  grouped.forEach(s=>{
    if(s.group!==current){ current=s.group; shoppingHtml += `<div class="shopping-group"><h4>${current}</h4></div>`; }
    shoppingHtml += `・${s.name} ${formatAmount(s.amount, s.unit)}<br>`;
  });
  shoppingHtml += `</div>`;
  document.getElementById("shopping").innerHTML=shoppingHtml;
}

    month:document.getElementById("month").innerHTML,
    shopping:document.getElementById("shopping").innerHTML,
    prep:document.getElementById("prep").innerHTML,
    week:document.getElementById("week").innerHTML
  };
  localStorage.setItem("mealplanner_ver15", JSON.stringify(data));
  alert("保存しました");
};
document.getElementById("loadBtn").onclick=()=>{
  const raw=localStorage.getItem("mealplanner_ver15");
  if(!raw){ alert("保存データがありません"); return; }
  const data=JSON.parse(raw);
  document.getElementById("people").value=data.people;
  document.getElementById("bentoPeople").value=data.bentoPeople;
  document.getElementById("bentoMode").value=data.bentoMode;
  document.getElementById("budget").value=data.budget;
  document.getElementById("snackBudget").value=data.snackBudget;
  document.getElementById("ng").value=data.ng;
  document.getElementById("snackFreq").value=data.snackFreq;
  activeTags.clear(); (data.tags||[]).forEach(t=>activeTags.add(t));
  document.querySelectorAll(".tag").forEach(el=>el.classList.toggle("active", activeTags.has(el.textContent)));
  document.getElementById("summary").innerHTML=data.summary;
  document.getElementById("month").innerHTML=data.month;
  document.getElementById("shopping").innerHTML=data.shopping;
  document.getElementById("prep").innerHTML=data.prep;
  document.getElementById("week").innerHTML=data.week;
};
makePlan();
</script>
</body>
</html>
