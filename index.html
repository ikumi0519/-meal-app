<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立プランナー</title>
<style>
body{font-family:sans-serif;background:#f7f5f2;padding:12px}
.card{background:#fff;border-radius:14px;padding:14px;margin:10px 0}
button{background:#e88b5a;color:#fff;border:0;border-radius:10px;padding:10px 16px}
</style>
</head>
<body>

<div class="card">
<h2>献立プランナー</h2>
<button onclick="makePlan()">作成</button>
</div>

<div id="result"></div>

<script>
const menus = [
  "鶏の照り焼き",
  "豚しょうが焼き",
  "ハンバーグ",
  "麻婆豆腐",
  "肉じゃが",
  "オムライス",
  "回鍋肉",
  "チキン南蛮"
];

function makePlan(){
  let used = [];
  let days = ["月","火","水","木","金"];
  let html = "<div class='card'><h3>今週の夕飯</h3>";

  days.forEach(day=>{
    let list = menus.filter(m => !used.includes(m));
    let menu = list[Math.floor(Math.random() * list.length)];
    used.push(menu);
    html += day + "： " + menu + "<br>";
  });

  html += "</div>";
  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
