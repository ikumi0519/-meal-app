<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>献立プランナー Ver14</title>
<style>
  :root{
    --bg:#f7f5f2; --card:#ffffff; --line:#e7dfd7; --text:#2c2a28; --muted:#756f68;
    --accent:#e88b5a; --accent2:#f6c89c; --green:#dff3de; --blue:#dfeefd; --yellow:#fff0bf; --pink:#f8d8e4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
  .wrap{max-width:920px;margin:0 auto;padding:14px}
  h1{margin:6px 0 14px;font-size:30px}
  h2{margin:20px 0 10px;font-size:24px}
  h3{margin:6px 0 10px;font-size:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  label{display:block;font-size:13px;color:var(--muted);margin:0 0 4px}
  input, select{width:100%;padding:11px 12px;border:1px solid #d7cec5;border-radius:12px;background:#fff;font-size:16px}
  button{border:none;border-radius:12px;background:var(--accent);color:#fff;padding:12px 14px;font-size:15px;font-weight:700}
  .ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .tagwrap{display:flex;gap:8px;flex-wrap:wrap}
  .tag{padding:8px 10px;border-radius:999px;border:1px solid #dccfc2;background:#fff;color:#60574e;font-size:14px;cursor:pointer}
  .tag.active{background:#fde7dc;border-color:#f1c2a6;color:#8f512b}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;margin:2px 6px 2px 0}
  .b-main{background:var(--accent2)}
  .b-side{background:var(--green)}
  .b-bento{background:var(--yellow)}
  .b-snack{background:var(--pink)}
  .b-info{background:var(--blue)}
  .small{font-size:12px;color:var(--muted)}
  .summary{display:flex;gap:8px;flex-wrap:wrap}
  .month-week{margin:10px 0 0}
  .month-week ul{margin:6px 0 0 18px;padding:0;line-height:1.8}
  .mealname{font-weight:800;font-size:19px;margin:6px 0}
  .recipe{display:none;margin-top:8px;padding:10px;border-radius:10px;background:#faf8f5}
  .shopping-group h4{margin:14px 0 6px}
  .note{padding:10px;border-radius:12px;background:#fff8f3;border:1px solid #f4d4be}
  @media (max-width:760px){
    .grid2,.grid3{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>献立プランナー Ver14</h1>

  <div class="card">
    <div class="grid3">
      <div>
        <label>家族人数</label>
        <input id="people" type="number" min="1" value="4">
      </div>
      <div>
        <label>お弁当人数</label>
        <input id="bentoPeople" type="number" min="0" value="1">
      </div>
      <div>
        <label>お弁当曜日</label>
        <select id="bentoMode">
          <option value="weekdays">平日のみ</option>
          <option value="everyday">毎日</option>
          <option value="none">なし</option>
        </select>
      </div>
    </div>

    <div class="grid2">
      <div>
        <label>月の食費予算</label>
        <input id="budget" type="number" min="0" value="50000">
      </div>
      <div>
        <label>嗜好品・おやつ予算</label>
        <input id="snackBudget" type="number" min="0" value="5000">
      </div>
    </div>

    <div class="grid2">
      <div>
        <label>避けたい食材</label>
        <input id="ng" placeholder="魚、きのこ、辛い物 など">
      </div>
      <div>
        <label>おやつ頻度</label>
        <select id="snackFreq">
          <option value="0">なし</option>
          <option value="2">週2回</option>
          <option value="3">週3回</option>
          <option value="5">ほぼ毎日</option>
        </select>
      </div>
    </div>

    <label>好み</label>
    <div class="tagwrap" id="tags"></div>

    <div class="toolbar">
      <button id="generateBtn" type="button">作成</button>
      <button id="saveBtn" class="ghost" type="button">保存</button>
      <button id="loadBtn" class="ghost" type="button">読込</button>
    </div>
  </div>

  <div id="summary"></div>
  <div id="month"></div>
  <div id="shopping"></div>
  <div id="prep"></div>
  <div id="week"></div>
</div>

<script>
const TAGS = [
  "がっつり","あっさり","野菜多め","肉多め","魚少なめ",
  "時短","節約","ヘルシー","子ども向け","大人向け",
  "作り置き向き","お弁当向き","和食寄り","洋食寄り","中華寄り",
  "麺好き","ご飯もの好き","揚げ物少なめ","甘めの味","さっぱり味"
];
const activeTags = new Set(["時短","節約"]);
const tagsBox = document.getElementById("tags");
TAGS.forEach(t=>{
  const el = document.createElement("button");
  el.type="button";
  el.className="tag"+(activeTags.has(t)?" active":"");
  el.textContent=t;
  el.onclick=()=>{
    if(activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
    el.classList.toggle("active");
  };
  tagsBox.appendChild(el);
});

const mains = [
  {name:"鶏の照り焼き",cat:"鶏",cost:680,tags:["時短","子ども向け","お弁当向き"],ing:[["鶏もも肉",400,"g","肉"],["玉ねぎ",1,"個","野菜"],["しょうゆ",2,"大さじ","調味料"],["みりん",2,"大さじ","調味料"]],steps:["鶏肉に軽く塩こしょうする","皮目から焼く","玉ねぎを入れる","しょうゆとみりんを絡める","照りが出たら完成"],time:"15分",keep:"冷蔵2日 / 冷凍2週間",tip:"弁当用は小分けにすると便利"},
  {name:"豚しょうが焼き",cat:"豚",cost:720,tags:["時短","ご飯もの好き"],ing:[["豚こま肉",400,"g","肉"],["玉ねぎ",1,"個","野菜"],["しょうが",1,"片","調味料"],["しょうゆ",1.5,"大さじ","調味料"]],steps:["豚肉を焼く","玉ねぎを加える","しょうがだれで仕上げる","汁気を飛ばす"],time:"12分",keep:"冷蔵2日",tip:"汁気少なめで弁当にも使いやすい"},
  {name:"ハンバーグ",cat:"ひき肉",cost:850,tags:["がっつり","子ども向け","作り置き向き"],ing:[["合いびき肉",500,"g","肉"],["玉ねぎ",1,"個","野菜"],["卵",1,"個","卵"],["パン粉",1,"カップ","主食"]],steps:["玉ねぎを炒めて冷ます","材料を混ぜる","成形する","両面焼く","弱火で中まで火を通す"],time:"25分",keep:"冷蔵2日 / 冷凍2週間",tip:"ミニサイズにすると弁当向き"},
  {name:"麻婆豆腐",cat:"豆腐",cost:620,tags:["時短","中華寄り"],ing:[["豚ひき肉",250,"g","肉"],["豆腐",1,"丁","豆腐"],["長ねぎ",1,"本","野菜"],["みそ",1,"大さじ","調味料"]],steps:["ひき肉を炒める","ねぎを加える","豆腐を入れる","調味料で煮る","とろみをつける"],time:"15分",keep:"冷蔵1日",tip:"弁当には不向き"},
  {name:"肉じゃが",cat:"煮物",cost:780,tags:["節約","作り置き向き","和食寄り"],ing:[["牛こま肉",300,"g","肉"],["じゃがいも",4,"個","野菜"],["玉ねぎ",1,"個","野菜"],["にんじん",1,"本","野菜"],["しょうゆ",2,"大さじ","調味料"]],steps:["材料を切る","肉を炒める","野菜を加える","だしと調味料で煮る","じゃがいもが柔らかくなったら完成"],time:"25分",keep:"冷蔵3日",tip:"翌日さらに味がなじむ"},
  {name:"オムライス",cat:"卵",cost:690,tags:["子ども向け","洋食寄り"],ing:[["鶏むね肉",250,"g","肉"],["玉ねぎ",1,"個","野菜"],["卵",4,"個","卵"],["ケチャップ",4,"大さじ","調味料"]],steps:["ケチャップライスを作る","卵を焼く","包む","ソースをかける"],time:"20分",keep:"当日",tip:"弁当より夕食向き"},
  {name:"野菜炒め",cat:"野菜",cost:540,tags:["野菜多め","時短","ヘルシー"],ing:[["豚こま肉",250,"g","肉"],["キャベツ",0.5,"個","野菜"],["にんじん",1,"本","野菜"],["もやし",1,"袋","野菜"]],steps:["肉を炒める","野菜を加えて強火で炒める","塩こしょうで味付けする"],time:"10分",keep:"冷蔵1日",tip:"水分が出やすいので作り置きは不向き"}
];

const sides = [
  {name:"卵焼き",cost:180,tags:["お弁当向き","時短"],ing:[["卵",3,"個","卵"]],steps:["卵を混ぜる","フライパンで焼く"],time:"8分",keep:"冷蔵2日",tip:"朝に焼いてもOK"},
  {name:"きんぴら",cost:220,tags:["作り置き向き","和食寄り"],ing:[["ごぼう",1,"本","野菜"],["にんじん",1,"本","野菜"],["しょうゆ",1,"大さじ","調味料"]],steps:["細切りにする","炒める","調味料で仕上げる"],time:"12分",keep:"冷蔵3〜4日",tip:"多めに作ると便利"},
  {name:"ブロッコリー塩ゆで",cost:200,tags:["野菜多め","ヘルシー"],ing:[["ブロッコリー",1,"株","野菜"]],steps:["小房に分ける","塩ゆでする"],time:"8分",keep:"冷蔵2〜3日",tip:"水気を切って保存"},
  {name:"ポテサラ",cost:260,tags:["子ども向け","洋食寄り"],ing:[["じゃがいも",3,"個","野菜"],["きゅうり",1,"本","野菜"],["マヨネーズ",3,"大さじ","調味料"]],steps:["じゃがいもをゆでる","つぶす","具を混ぜる"],time:"18分",keep:"冷蔵2日",tip:"弁当は水分少なめに"},
  {name:"ひじき煮",cost:230,tags:["作り置き向き","ヘルシー"],ing:[["乾燥ひじき",1,"袋","野菜"],["にんじん",1,"本","野菜"]],steps:["戻す","炒める","煮る"],time:"15分",keep:"冷蔵3日",tip:"小分け冷凍も可"},
  {name:"ほうれん草おひたし",cost:180,tags:["野菜多め","さっぱり味"],ing:[["ほうれん草",1,"袋","野菜"]],steps:["ゆでる","水気をしぼる","だしで和える"],time:"8分",keep:"冷蔵2日",tip:"汁気をよく切る"}
];

const preps = [
  {name:"鶏そぼろ",cost:420,ing:[["鶏ひき肉",400,"g","肉"],["しょうゆ",1.5,"大さじ","調味料"]],steps:["炒める","甘辛く味付けする"],time:"10分",keep:"冷蔵3日 / 冷凍2週間",tip:"弁当用は小分け冷凍"},
  {name:"ミニハンバーグ",cost:520,ing:[["合いびき肉",400,"g","肉"],["玉ねぎ",1,"個","野菜"]],steps:["タネを作る","小さく成形して焼く"],time:"18分",keep:"冷蔵2日 / 冷凍2週間",tip:"朝は温めるだけでOK"},
  {name:"卵焼き",cost:180,ing:[["卵",6,"個","卵"]],steps:["焼く"],time:"10分",keep:"冷蔵2日",tip:"朝や弁当に使いやすい"},
  {name:"きんぴら",cost:220,ing:[["ごぼう",1,"本","野菜"],["にんじん",1,"本","野菜"]],steps:["炒めて味付け"],time:"12分",keep:"冷蔵3〜4日",tip:"多めに作ると便利"}
];

const breakfasts = [
  {name:"ご飯＋味噌汁＋納豆＋卵焼き",cost:220,ing:[["納豆",3,"パック","朝食"],["卵",2,"個","卵"]],steps:["卵焼きを作る","味噌汁を用意する"],time:"10分",keep:"当日",tip:"定番で失敗しにくい"},
  {name:"ご飯＋味噌汁＋ウインナー＋ヨーグルト",cost:280,ing:[["ウインナー",1,"袋","肉"],["ヨーグルト",1,"パック","朝食"]],steps:["ウインナーを焼く","味噌汁を用意する"],time:"8分",keep:"当日",tip:"忙しい日に向く"},
  {name:"おにぎり＋味噌汁＋ゆで卵",cost:240,ing:[["卵",3,"個","卵"]],steps:["おにぎりを作る","ゆで卵を作る"],time:"12分",keep:"当日",tip:"持ち出しやすい"}
];

function roundHalf(n){ return Math.round(n*2)/2; }

function formatAmount(value, unit){
  if(unit==="g"){
    const v = Math.ceil(value/100)*100;
    return v>=1000 ? (v/1000).toFixed(1)+"kg" : v+"g";
  }
  if(unit==="大さじ" || unit==="小さじ"){
    return roundHalf(value)+unit;
  }
  if(["個","本","株","袋","丁","パック","カップ","片"].includes(unit)){
    if(value===0.25) return "1/4"+unit;
    if(value===0.5) return "1/2"+unit;
    if(value===0.75) return "3/4"+unit;
    return Math.ceil(value)+unit;
  }
  return value+unit;
}

function addToShopping(map, list, ratio){
  list.forEach(i=>{
    const key = i[0]+"_"+i[2];
    if(!map[key]) map[key] = {name:i[0], amount:0, unit:i[2], group:i[3]||"その他"};
    map[key].amount += i[1]*ratio;
  });
}

function groupOrder(g){
  return ["野菜","肉","卵","豆腐","朝食","主食","調味料","その他"].indexOf(g);
}

function badgeHtml(label, cls){ return `<span class="badge ${cls}">${label}</span>`; }

function recipeBlock(item){
  return `
    <button class="ghost" onclick="toggleRecipe(this)" style="margin-top:8px;padding:8px 10px;background:#fff;color:#e88b5a;border:1px solid #e88b5a;width:auto">レシピを見る</button>
    <div class="recipe">
      <div class="small"><b>材料</b></div>
      ${item.ing.map(x=>`・${x[0]} ${formatAmount(x[1], x[2])}`).join("<br>")}
      <div class="small" style="margin-top:8px"><b>手順</b></div>
      ${item.steps.map((s, idx)=>`${idx+1}. ${s}`).join("<br>")}
      <div class="small" style="margin-top:8px">目安時間：${item.time}</div>
      <div class="small">保存：${item.keep}</div>
      <div class="small">一言：${item.tip}</div>
    </div>
  `;
}

function toggleRecipe(btn){
  const rec = btn.nextElementSibling;
  rec.style.display = rec.style.display === "block" ? "none" : "block";
}

function pickDifferent(arr, prevName){
  const filtered = arr.filter(x=>x.name !== prevName);
  return filtered[Math.floor(Math.random()*filtered.length)];
}

function mealAllowed(item, ng){
  if(!ng) return true;
  return !item.name.includes(ng) && !item.ing.some(i=>i[0].includes(ng));
}

function makePlan(){
  const people = Number(document.getElementById("people").value) || 4;
  const bentoPeople = Number(document.getElementById("bentoPeople").value) || 1;
  const monthlyBudget = Number(document.getElementById("budget").value) || 0;
  const snackBudget = Number(document.getElementById("snackBudget").value) || 0;
  const ng = (document.getElementById("ng").value || "").trim();

  const mains2 = mains.filter(x=>mealAllowed(x, ng));
  const sides2 = sides.filter(x=>mealAllowed(x, ng));
  const preps2 = preps.filter(x=>mealAllowed(x, ng));
  const breakfasts2 = breakfasts.filter(x=>mealAllowed(x, ng));

  let total = 0;
  let shopping = {};
  const weeklyBudget = Math.round((monthlyBudget - snackBudget) / 4.3);

  document.getElementById("month").innerHTML = `
    <div class="card">
      <h3>1ヶ月メニュー</h3>
      ${[1,2,3,4].map(w=>{
        return `<div class="month-week"><b>第${w}週</b><ul>${
          Array.from({length:7}).map(()=>`<li>${mains2[Math.floor(Math.random()*mains2.length)].name}</li>`).join("")
        }</ul></div>`;
      }).join("")}
    </div>`;

  let prepHtml = `<div class="card"><h3>日曜：作り置き</h3>`;
  preps2.forEach(p=>{
    prepHtml += `✔ ${p.name} <span class="small">(${p.keep})</span><br><span class="small">${p.tip}</span><br>`;
    total += p.cost;
    addToShopping(shopping, p.ing, 1);
  });
  prepHtml += `</div>`;
  document.getElementById("prep").innerHTML = prepHtml;

  let weekHtml = "";
  let prevMain = "";

  ["月","火","水","木","金"].forEach(day=>{
    const breakfast = breakfasts2[Math.floor(Math.random()*breakfasts2.length)];
    const main = pickDifferent(mains2, prevMain);
    prevMain = main.name;
    const side1 = sides2[Math.floor(Math.random()*sides2.length)];
    const side2 = pickDifferent(sides2, side1.name);

    total += breakfast.cost + main.cost + side1.cost + side2.cost;
    addToShopping(shopping, breakfast.ing, people/3);
    addToShopping(shopping, main.ing, people/3);
    addToShopping(shopping, side1.ing, people/3);
    addToShopping(shopping, side2.ing, people/3);

    weekHtml += `
      <div class="card">
        <h3>${day}</h3>
        ${badgeHtml("朝ごはん","b-info")}<div class="mealname">${breakfast.name}</div>
        ${recipeBlock(breakfast)}
        <div style="margin-top:10px">${badgeHtml("お弁当","b-bento")} 主菜：作り置き / 副菜①：${side1.name} / 副菜②：${side2.name} / 彩り：ミニトマト <div class="small">お弁当 ${bentoPeople}人分</div></div>
        <div style="margin-top:10px">${badgeHtml("主菜","b-main")}<div class="mealname">${main.name}</div>${recipeBlock(main)}</div>
        <div style="margin-top:10px">${badgeHtml("副菜","b-side")} ${side1.name} / ${side2.name}</div>
      </div>
    `;
  });
  document.getElementById("week").innerHTML = weekHtml;

  const remain = weeklyBudget - total;
  document.getElementById("summary").innerHTML = `
    <div class="card">
      <div class="summary">
        ${badgeHtml("週予算目安 "+weeklyBudget.toLocaleString()+"円","b-info")}
        ${badgeHtml("今週概算 "+total.toLocaleString()+"円","b-main")}
        ${badgeHtml("残り "+remain.toLocaleString()+"円","b-side")}
      </div>
      <div class="small" style="margin-top:8px">※ 調味料は概算・目安です。</div>
    </div>`;

  const grouped = Object.values(shopping).sort((a,b)=>{
    const ga = groupOrder(a.group), gb = groupOrder(b.group);
    return ga===gb ? a.name.localeCompare(b.name,'ja') : ga-gb;
  });

  let shoppingHtml = `<div class="card"><h3>土曜：買い物リスト</h3>`;
  let current = "";
  grouped.forEach(s=>{
    if(s.group !== current){
      current = s.group;
      shoppingHtml += `<div class="shopping-group"><h4>${current}</h4></div>`;
    }
    shoppingHtml += `・${s.name} ${formatAmount(s.amount, s.unit)}<br>`;
  });
  shoppingHtml += `</div>`;
  document.getElementById("shopping").innerHTML = shoppingHtml;
}

document.getElementById("generateBtn").onclick = makePlan;
document.getElementById("saveBtn").onclick = ()=>{
  const data = {
    people: document.getElementById("people").value,
    bentoPeople: document.getElementById("bentoPeople").value,
    bentoMode: document.getElementById("bentoMode").value,
    budget: document.getElementById("budget").value,
    snackBudget: document.getElementById("snackBudget").value,
    ng: document.getElementById("ng").value,
    snackFreq: document.getElementById("snackFreq").value,
    tags: Array.from(activeTags),
    summary: document.getElementById("summary").innerHTML,
    month: document.getElementById("month").innerHTML,
    shopping: document.getElementById("shopping").innerHTML,
    prep: document.getElementById("prep").innerHTML,
    week: document.getElementById("week").innerHTML
  };
  localStorage.setItem("mealplanner_ver14", JSON.stringify(data));
  alert("保存しました");
};
document.getElementById("loadBtn").onclick = ()=>{
  const raw = localStorage.getItem("mealplanner_ver14");
  if(!raw){ alert("保存データがありません"); return; }
  const data = JSON.parse(raw);
  document.getElementById("people").value = data.people;
  document.getElementById("bentoPeople").value = data.bentoPeople;
  document.getElementById("bentoMode").value = data.bentoMode;
  document.getElementById("budget").value = data.budget;
  document.getElementById("snackBudget").value = data.snackBudget;
  document.getElementById("ng").value = data.ng;
  document.getElementById("snackFreq").value = data.snackFreq;
  activeTags.clear();
  (data.tags||[]).forEach(t=>activeTags.add(t));
  document.querySelectorAll(".tag").forEach(el=>{
    el.classList.toggle("active", activeTags.has(el.textContent));
  });
  document.getElementById("summary").innerHTML = data.summary;
  document.getElementById("month").innerHTML = data.month;
  document.getElementById("shopping").innerHTML = data.shopping;
  document.getElementById("prep").innerHTML = data.prep;
  document.getElementById("week").innerHTML = data.week;
};
makePlan();
</script>
</body>
</html>
