<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立プランナー Ver9</title>

<style>
body{font-family:sans-serif;background:#f7f5f2;margin:0;padding:10px}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:12px}
h2{margin:5px 0}
.badge{padding:3px 6px;border-radius:6px;font-size:11px;margin-right:4px}
.green{background:#c8f7c5}
.blue{background:#c5e3f7}
</style>
</head>

<body>

<h2>献立プランナー Ver9</h2>

<div class="card">
人数 <input id="people" type="number" value="3"><br>
避けたい食材 <input id="ng"><br><br>
<button onclick="make()">作成</button>
</div>

<div id="shopping"></div>
<div id="prep"></div>
<div id="week"></div>

<script>

const dinners=[
{name:"鶏の照り焼き",cat:"鶏",veg:true,ing:[["鶏もも肉",300,"g"],["玉ねぎ",1,"個"]]},
{name:"豚しょうが焼き",cat:"豚",veg:true,ing:[["豚肉",300,"g"],["玉ねぎ",1,"個"]]},
{name:"ハンバーグ",cat:"牛",veg:false,ing:[["ひき肉",300,"g"],["玉ねぎ",1,"個"]]},
{name:"麻婆豆腐",cat:"豆腐",veg:false,ing:[["ひき肉",200,"g"],["豆腐",1,"丁"]]},
{name:"野菜炒め",cat:"野菜",veg:true,ing:[["キャベツ",0.25,"個"],["にんじん",1,"本"]]}
];

const prepFoods=[
{name:"鶏そぼろ",ing:[["鶏ひき肉",400,"g"]]},
{name:"ミニハンバーグ",ing:[["ひき肉",400,"g"]]},
{name:"卵焼き",ing:[["卵",6,"個"]]},
{name:"ブロッコリー",ing:[["ブロッコリー",1,"株"]]},
{name:"きんぴら",ing:[["ごぼう",1,"本"],["にんじん",1,"本"]]}
];

function frac(n){
 if(n==0.25)return "1/4";
 if(n==0.5)return "1/2";
 return n;
}

function make(){

 let people=Number(document.getElementById("people").value);
 let ng=document.getElementById("ng").value;

 let shopping={};
 let weekHTML="";
 let prev="";

 // 月〜金
 for(let i=0;i<5;i++){

  let list=dinners.filter(m=>!m.name.includes(ng)&&m.cat!=prev);
  let pick=list[Math.floor(Math.random()*list.length)];
  prev=pick.cat;

  weekHTML+=`<div class="card">
  <b>${["月","火","水","木","金"][i]}</b><br>
  朝：固定<br>
  弁当：作り置き詰める<br>
  夜：${pick.name}
  </div>`;

  pick.ing.forEach(x=>{
    let name=x[0];
    let amt=x[1]*people;
    let unit=x[2];

    if(!shopping[name])shopping[name]={amt:0,unit:unit};
    shopping[name].amt+=amt;
  });
 }

 // 日曜作り置き
 let prepHTML="<div class='card'><b>日曜作り置き</b><br>";
 prepFoods.forEach(p=>{
   prepHTML+=p.name+"<br>";
   p.ing.forEach(x=>{
     if(!shopping[x[0]])shopping[x[0]]={amt:0,unit:x[2]};
     shopping[x[0]].amt+=x[1];
   });
 });
 prepHTML+="</div>";

 document.getElementById("prep").innerHTML=prepHTML;

 // 買い物
 let shopHTML="<div class='card'><b>土曜買い物</b><br>";

 for(let k in shopping){

   let v=shopping[k];

   if(v.unit=="g"){
     v.amt=Math.ceil(v.amt/100)*100;
     if(v.amt>=1000){
       shopHTML+=`${k} ${(v.amt/1000).toFixed(1)}kg<br>`;
     }else{
       shopHTML+=`${k} ${v.amt}g<br>`;
     }
   }else{
     v.amt=Math.ceil(v.amt);
     shopHTML+=`${k} ${frac(v.amt)}${v.unit}<br>`;
   }
 }

 shopHTML+="</div>";

 document.getElementById("shopping").innerHTML=shopHTML;
 document.getElementById("week").innerHTML=weekHTML;

}

</script>

</body>
</html>
