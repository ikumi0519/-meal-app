<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>献立プランナー Ver15</title>
<style>
  :root{
    --bg:#f7f5f2; --card:#ffffff; --line:#e7dfd7; --text:#2c2a28; --muted:#756f68;
    --accent:#0f766e; --accent2:#f0fdfa; --green:#dff3de; --blue:#dfeefd; --yellow:#fff0bf; --pink:#f8d8e4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif}
  .wrap{max-width:920px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
  h1{margin:6px 0 14px;font-size:26px;color:var(--accent)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  input, select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:16px}
  button{border:none;border-radius:10px;background:var(--accent);color:#fff;padding:12px;font-weight:700;width:100%;cursor:pointer}
  .mealname{font-weight:800;font-size:18px;margin:5px 0}
  .badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;margin-right:5px}
  .b-main{background:var(--accent2);color:var(--accent)}
  @media (max-width:600px){ .grid3{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <h1>献立プランナー Ver15</h1>

  <div class="card">
    <div class="grid3">
      <div><label>家族人数</label><input id="people" type="number" value="3"></div>
      <div><label>月の予算</label><input id="budget" type="number" value="50000"></div>
      <div><label>おやつ頻度</label><select id="snackFreq"><option value="2">週2回</option><option value="7">毎日</option></select></div>
    </div>
    <button id="genBtn" style="margin-top:15px">最強の献立を作成</button>
  </div>

  <div id="result"></div>
</div>

<script>
// 育美さんのための厳選レシピリスト（被り防止用属性付き）
const masterMains = [
  {name:"鶏の照り焼きマヨ", cat:"鶏", cost:600, ingredients:["鶏もも肉","キャベツ"]},
  {name:"豚の甘辛炒め", cat:"豚", cost:650, ingredients:["豚こま","玉ねぎ"]},
  {name:"サバの味噌煮風", cat:"魚", cost:700, ingredients:["サバ切り身","長ねぎ"]},
  {name:"厚揚げの麻婆豆腐", cat:"豆腐", cost:500, ingredients:["厚揚げ","ひき肉"]},
  {name:"鮭のバターポン酢", cat:"魚", cost:750, ingredients:["鮭","しめじ"]},
  {name:"ひき肉オムレツ", cat:"卵", cost:550, ingredients:["卵","ひき肉","じゃがいも"]},
  {name:"肉巻き豆腐", cat:"肉", cost:600, ingredients:["豚バラ","木綿豆腐"]},
  {name:"野菜たっぷり焼きそば", cat:"麺", cost:450, ingredients:["焼きそば麺","豚肉","キャベツ"]},
  {name:"鶏むねの南蛮漬け", cat:"鶏", cost:550, ingredients:["鶏むね肉","にんじん","玉ねぎ"]}
];

function generate() {
  let html = "";
  let usedNames = new Set(); // これで同じ料理が出ないようにします
  let lastCat = ""; // 直前と同じ肉・魚が続かないようにします

  for (let w = 1; w <= 4; w++) {
    html += `<div class="card"><h3>第${w}週</h3><ul>`;
    let weekCount = 0;
    
    // 1週間分の料理をシャッフルして選ぶ
    let pool = [...masterMains].sort(() => Math.random() - 0.5);
    
    for (let d = 0; d < 7; d++) {
      // 1. 同じ名前は避ける 2. 同じ種類(鶏・豚など)は連続させない
      let match = pool.find(m => !usedNames.has(m.name) && m.cat !== lastCat);
      
      // もし見つからなかったら、名前被りだけ避ける
      if (!match) match = pool.find(m => !usedNames.has(m.name));
      // それでもなかったら、単に未選択のものを出す
      if (!match) match = pool[d % pool.length];

      html += `<li>${['月','火','水','木','金','土','日'][d]}：<span class="mealname">${match.name}</span> <span class="badge b-main">${match.cat}</span></li>`;
      
      lastCat = match.cat;
      // 1ヶ月の中でなるべく被らせたくない場合はここを調整
      if (w < 2) usedNames.add(match.name); 
    }
    html += `</ul></div>`;
    // 2週ごとにリセットして、お気に入り料理がまた出るようにする
    if (w % 2 === 0) usedNames.clear();
  }
  document.getElementById('result').innerHTML = html;
}

document.getElementById('genBtn').onclick = generate;
generate(); // 初期表示
</script>
</body>
</html>
