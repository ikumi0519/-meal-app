function formatAmount(v,u){
  if(u==="g"){
    const x = Math.ceil(v/100)*100;
    return x>=1000 ? (x/1000).toFixed(1)+"kg" : x+"g";
  }
  if(["個","本","株","袋","丁","パック","枚","片"].includes(u)){
    if(v===0.5) return "1/2"+u;
    if(v===0.25) return "1/4"+u;
    return Math.ceil(v)+u;
  }
  return v+u;
}

function recipe(item){
  return '<button onclick="var x=this.nextElementSibling;x.style.display=x.style.display===\\'block\\'?\\'none\\':\\'block\\'" class="ghost" style="margin-top:8px">レシピを見る</button><div class="recipe"><b>材料</b><br>'+item.ing.map(x=>'・'+x[0]+' '+formatAmount(x[1],x[2])).join('<br>')+'<br><br><b>手順</b><br>'+item.steps.map((s,i)=>(i+1)+'. '+s).join('<br>')+'<br><br><span class="small">目安時間：'+item.time+' / 保存：'+item.keep+'</span></div>';
}

function addShop(shop, ing, ratio){
  ing.forEach(x=>{
    const key = x[0] + '_' + x[2];
    if(!shop[key]) shop[key] = {name:x[0], amount:0, unit:x[2]};
    shop[key].amount += x[1]*ratio;
  });
}

function getActiveTags(){
  return [...document.querySelectorAll('.tag.active')].map(x=>x.textContent);
}

function score(item){
  let s = Math.random()*0.1;
  const tags = getActiveTags();
  if(tags.includes('時短') && item.tags && item.tags.includes('時短')) s += 1;
  if(tags.includes('節約') && item.tags && item.tags.includes('節約')) s += 1;
  if(tags.includes('子ども向け') && item.tags && item.tags.includes('子ども向け')) s += 1;
  if(tags.includes('ヘルシー') && item.tags && item.tags.includes('ヘルシー')) s += 1;
  if(tags.includes('和食寄り') && item.tags && item.tags.includes('和食寄り')) s += 0.8;
  if(tags.includes('洋食寄り') && item.tags && item.tags.includes('洋食寄り')) s += 0.8;
  if(tags.includes('中華寄り') && item.tags && item.tags.includes('中華寄り')) s += 0.8;
  if(tags.includes('がっつり') && item.tags && item.tags.includes('がっつり')) s += 1;
  if(tags.includes('野菜多め') && item.tags && item.tags.includes('野菜多め')) s += 1;
  return s;
}

function pickBest(list){
  return list.map(x=>({item:x, score:score(x)})).sort((a,b)=>b.score-a.score)[0].item;
}

function filterDinnerPool(){
  const ng = (document.getElementById('ng').value || '').trim();
  const pool = dinners.filter(x => !ng || (!x.name.includes(ng) && !x.ing.some(i=>i[0].includes(ng))));
  return pool.length ? pool : dinners;
}

function buildMonth(pool){
  const month = [];
  const count = {};
  let recent = [];
  let prevCat = '';

  for(let w=0; w<4; w++){
    const week = [];
    for(let d=0; d<7; d++){
      let cand = pool.filter(x => !recent.includes(x.name) && x.cat !== prevCat && (count[x.name] || 0) < 2);
      if(!cand.length) cand = pool.filter(x => x.cat !== prevCat && (count[x.name] || 0) < 2);
      if(!cand.length) cand = pool.filter(x => (count[x.name] || 0) < 2);
      if(!cand.length) cand = pool.filter(x => !recent.includes(x.name));
      if(!cand.length) cand = pool;

      const pick = pickBest(cand);
      week.push(pick);
      count[pick.name] = (count[pick.name] || 0) + 1;
      recent.push(pick.name);
      if(recent.length > 8) recent.shift();
      prevCat = pick.cat;
    }
    month.push(week);
  }
  return month;
}

function buildWeek(pool){
  const weekly = [];
  const used = new Set();
  let prevCat = '';

  for(let i=0; i<5; i++){
    let cand = pool.filter(x => !used.has(x.name) && x.cat !== prevCat);
    if(!cand.length) cand = pool.filter(x => !used.has(x.name));
    if(!cand.length) cand = pool;

    const pick = pickBest(cand);
    weekly.push(pick);
    used.add(pick.name);
    prevCat = pick.cat;
  }
  return weekly;
}

function buildSidesForWeek(){
  const usedSides = new Set();
  const weekSides = [];
  for(let i=0; i<5; i++){
    let cand1 = sides.filter(x => !usedSides.has(x.name));
    if(!cand1.length){ usedSides.clear(); cand1 = [...sides]; }
    const s1 = pickBest(cand1);
    usedSides.add(s1.name);

    let cand2 = sides.filter(x => x.name !== s1.name && !usedSides.has(x.name));
    if(!cand2.length) cand2 = sides.filter(x => x.name !== s1.name);
    const s2 = pickBest(cand2);
    usedSides.add(s2.name);

    weekSides.push([s1,s2]);
  }
  return weekSides;
}

function makePlan(){
  const people = Number(document.getElementById('people').value) || 4;
  const bentoPeople = Number(document.getElementById('bentoPeople').value) || 1;
  const budget = Number(document.getElementById('budget').value) || 0;
  const snackBudget = Number(document.getElementById('snackBudget').value) || 0;

  const dinnerPool = filterDinnerPool();
  const monthPlan = buildMonth(dinnerPool);
  const weekDinners = buildWeek(dinnerPool);
  const weekSides = buildSidesForWeek();

  document.getElementById('month').innerHTML =
    '<div class="card"><h3>1ヶ月メニュー</h3>' +
    monthPlan.map((w,i)=>'<div><b>第'+(i+1)+'週</b><ul>'+w.map(x=>'<li>'+x.name+'</li>').join('')+'</ul></div>').join('') +

  preps.forEach(p=>{
    prepHtml += '✔ ' + p.name + ' <span class="small">(' + p.keep + ')</span><br><span class="small">' + p.tip + '</span><br>';
    total += p.cost;
    addShop(shopping, p.ing, 1);
  });
  prepHtml += '</div>';
  document.getElementById('prep').innerHTML = prepHtml;

  let weekHtml = '';
  ['月','火','水','木','金'].forEach((d,i)=>{
    const breakfast = breakfasts[i % breakfasts.length];
    const dinner = weekDinners[i];
    const s1 = weekSides[i][0];
    const s2 = weekSides[i][1];

    total += breakfast.cost + dinner.cost + s1.cost + s2.cost;
    addShop(shopping, breakfast.ing, people/3);
    addShop(shopping, dinner.ing, people/3);
    addShop(shopping, s1.ing, people/3);
    addShop(shopping, s2.ing, people/3);

    weekHtml +=
      '<div class="card"><h3>'+d+'</h3>' +
      '<span class="badge info">朝ごはん</span><div>'+breakfast.name+'</div>'+recipe(breakfast) +
      '<div style="margin-top:10px"><span class="badge bento">お弁当</span> 主菜：作り置き / 副菜①：'+s1.name+' / 副菜②：'+s2.name+' / 彩り：ミニトマト<div class="small">お弁当 '+bentoPeople+'人分</div></div>' +
      '<div style="margin-top:10px"><span class="badge dinner">夕飯</span><div>'+dinner.name+'</div>'+recipe(dinner)+'</div>' +
      '<div style="margin-top:10px"><span class="badge side">副菜</span> '+s1.name+' / '+s2.name+'</div>' +
      '</div>';
  });
  document.getElementById('week').innerHTML = weekHtml;

  const weeklyBudget = Math.round((budget - snackBudget) / 4.3);
  document.getElementById('summary').innerHTML =
    '<div class="card">' +
    '<span class="badge info">週予算目安 ' + weeklyBudget.toLocaleString() + '円</span>' +
    '<span class="badge dinner">今週概算 ' + total.toLocaleString() + '円</span>' +
    '<span class="badge side">残り ' + (weeklyBudget-total).toLocaleString() + '円</span>' +
    '</div>';

  let shopHtml = '<div class="card"><h3>土曜：買い物リスト</h3>';
  Object.values(shopping).forEach(x=>{
    shopHtml += '・' + x.name + ' ' + formatAmount(x.amount, x.unit) + '<br>';
  });
  shopHtml += '</div>';
  document.getElementById('shopping').innerHTML = shopHtml;

  setStatus('作成しました');
}

document.querySelectorAll('.tag').forEach(el=>{
  el.addEventListener('click', ()=>el.classList.toggle('active'));
});

document.getElementById('makeBtn').addEventListener('click', makePlan);

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const data = {
    people: document.getElementById('people').value,
    bentoPeople: document.getElementById('bentoPeople').value,
    budget: document.getElementById('budget').value,
    snackBudget: document.getElementById('snackBudget').value,
    ng: document.getElementById('ng').value,
    summary: document.getElementById('summary').innerHTML,
    month: document.getElementById('month').innerHTML,
    shopping: document.getElementById('shopping').innerHTML,
    prep: document.getElementById('prep').innerHTML,
    week: document.getElementById('week').innerHTML
  };
  localStorage.setItem('mealplanner_ver16', JSON.stringify(data));
  alert('保存しました');
});

document.getElementById('loadBtn').addEventListener('click', ()=>{
  const raw = localStorage.getItem('mealplanner_ver16');
  if(!raw){
    alert('保存データがありません');
    return;
  }
  const d = JSON.parse(raw);
  document.getElementById('people').value = d.people;
  document.getElementById('bentoPeople').value = d.bentoPeople;
  document.getElementById('budget').value = d.budget;
  document.getElementById('snackBudget').value = d.snackBudget;
  document.getElementById('ng').value = d.ng;
  document.getElementById('summary').innerHTML = d.summary;
  document.getElementById('month').innerHTML = d.month;
  document.getElementById('shopping').innerHTML = d.shopping;
  document.getElementById('prep').innerHTML = d.prep;
  document.getElementById('week').innerHTML = d.week;
  setStatus('保存データを読み込みました');
});

makePlan();
})();
</script>
</body>
</html>
