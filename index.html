<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週末仕込み献立 Ver13</title>
<style>
body{font-family:sans-serif;background:#f6f6f6;margin:0;padding:10px;color:#333}
.card{background:#fff;border-radius:12px;padding:12px;margin:10px 0}
h1,h2,h3{margin:4px 0 10px}
input,select{width:100%;padding:8px;margin:4px 0 10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{background:#ff7f50;color:#fff;border:none;padding:10px 12px;border-radius:10px;width:100%;font-size:15px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{display:inline-block;padding:4px 8px;border-radius:8px;font-size:12px;margin:2px 4px 2px 0}
.main{background:#ffd6a5}
.side{background:#c8f7c5}
.bento{background:#fff3b0}
.snack{background:#f9c5d1}
.info{background:#d9ecff}
.small{font-size:12px;color:#666}
.recipe{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed #ddd}
.recipe-btn{background:#fff;color:#ff7f50;border:1px solid #ff7f50;margin-top:8px}
.totalbox{background:#fff7ef;border:1px solid #ffd8bf}
.tag{display:inline-block;padding:6px 10px;border-radius:8px;background:#eee;margin:3px;font-size:13px}
</style>
</head>
<body>

<h1>週末仕込み献立 Ver13</h1>

<div class="card">
  <div class="row">
    <div>
      <label>家族人数</label>
      <input id="people" type="number" value="3" min="1">
    </div>
    <div>
      <label>お弁当人数</label>
      <input id="bentoPeople" type="number" value="1" min="0">
    </div>
  </div>

  <div class="row">
    <div>
      <label>月の食費予算（円）</label>
      <input id="monthlyBudget" type="number" value="50000" min="0">
    </div>
    <div>
      <label>嗜好品・おやつ予算（円）</label>
      <input id="snackBudget" type="number" value="5000" min="0">
    </div>
  </div>

  <label>避けたい食材</label>
  <input id="ng" placeholder="魚、きのこ など">

  <label>好み</label>
  <div>
    <span class="tag">時短</span>
    <span class="tag">節約</span>
    <span class="tag">野菜多め</span>
    <span class="tag">がっつり</span>
    <span class="tag">子ども向け</span>
    <span class="tag">ヘルシー</span>
  </div>

  <button onclick="makePlan()">今週作る</button>
</div>

<div id="summary"></div>
<div id="shopping"></div>
<div id="prep"></div>
<div id="result"></div>

<script>
const mainDB = [
{
  name:"鶏の照り焼き", cost:680,
  ingredients:[["鶏もも肉",400,"g"],["玉ねぎ",1,"個"],["しょうゆ",2,"大さじ"],["みりん",2,"大さじ"]],
  steps:["鶏肉を焼く","玉ねぎを加える","調味料を絡める"],
  bento:true, prep:true, category:"鶏"
},
{
  name:"豚しょうが焼き", cost:720,
  ingredients:[["豚こま肉",400,"g"],["玉ねぎ",1,"個"],["しょうが",1,"個"]],
  steps:["豚肉を焼く","玉ねぎを炒める","しょうがだれで仕上げる"],
  bento:true, prep:false, category:"豚"
},
{
  name:"ハンバーグ", cost:850,
  ingredients:[["合いびき肉",500,"g"],["玉ねぎ",1,"個"],["卵",1,"個"]],
  steps:["玉ねぎを炒める","タネを作る","焼く"],
  bento:true, prep:true, category:"ひき肉"
},
{
  name:"麻婆豆腐", cost:620,
  ingredients:[["豚ひき肉",250,"g"],["豆腐",1,"丁"],["長ねぎ",1,"本"]],
  steps:["ひき肉を炒める","豆腐とねぎを入れる","味付けする"],
  bento:false, prep:false, category:"豆腐"
},
{
  name:"野菜炒め", cost:540,
  ingredients:[["豚こま肉",250,"g"],["キャベツ",0.5,"個"],["にんじん",1,"本"]],
  steps:["肉を炒める","野菜を加える","塩こしょうで仕上げる"],
  bento:false, prep:false, category:"野菜"
},
{
  name:"肉じゃが", cost:780,
  ingredients:[["牛こま肉",300,"g"],["じゃがいも",4,"個"],["玉ねぎ",1,"個"],["にんじん",1,"本"]],
  steps:["材料を切る","炒める","だしで煮る"],
  bento:true, prep:true, category:"煮物"
},
{
  name:"オムライス", cost:690,
  ingredients:[["鶏むね肉",250,"g"],["玉ねぎ",1,"個"],["卵",4,"個"]],
  steps:["ケチャップライスを作る","卵を焼く","包む"],
  bento:false, prep:false, category:"卵"
}
];

const sideDB = [
{
  name:"卵焼き", cost:180, storage:"冷蔵2日", tip:"冷ましてから詰める",
  ingredients:[["卵",3,"個"]], steps:["卵を混ぜる","焼く"]
},
{
  name:"きんぴら", cost:220, storage:"冷蔵3〜4日", tip:"小分けで便利",
  ingredients:[["ごぼう",1,"本"],["にんじん",1,"本"]], steps:["細切りにする","炒めて味付け"]
},
{
  name:"ブロッコリー", cost:200, storage:"冷蔵2〜3日", tip:"ゆでて水気を切る",
  ingredients:[["ブロッコリー",1,"株"]], steps:["小房に分ける","ゆでる"]
},
{
  name:"ポテサラ", cost:260, storage:"冷蔵2日", tip:"弁当は水分少なめで",
  ingredients:[["じゃがいも",3,"個"],["きゅうり",1,"本"]], steps:["じゃがいもをゆでる","つぶして和える"]
},
{
  name:"ひじき煮", cost:230, storage:"冷蔵3日", tip:"作り置き向き",
  ingredients:[["乾燥ひじき",1,"袋"],["にんじん",1,"本"]], steps:["戻す","煮る"]
},
{
  name:"ほうれん草おひたし", cost:180, storage:"冷蔵2日", tip:"水気をよくしぼる",
  ingredients:[["ほうれん草",1,"袋"]], steps:["ゆでる","和える"]
}
];

const prepDB = [
{
  name:"鶏そぼろ", cost:420, storage:"冷蔵3日 / 冷凍2週間", tip:"弁当用は小分け冷凍",
  ingredients:[["鶏ひき肉",400,"g"]], steps:["炒める","甘辛く味付け"]
},
{
  name:"ミニハンバーグ", cost:520, storage:"冷蔵2日 / 冷凍2週間", tip:"弁当向き",
  ingredients:[["合いびき肉",400,"g"],["玉ねぎ",1,"個"]], steps:["タネを作る","小さく焼く"]
},
{
  name:"卵焼き", cost:180, storage:"冷蔵2日", tip:"朝や弁当に使える",
  ingredients:[["卵",6,"個"]], steps:["焼く"]
},
{
  name:"きんぴら", cost:220, storage:"冷蔵3〜4日", tip:"多めに作ると便利",
  ingredients:[["ごぼう",1,"本"],["にんじん",1,"本"]], steps:["炒める","味付け"]
}
];

const breakfastDB = [
{
  name:"ご飯＋味噌汁＋納豆＋卵焼き", cost:220,
  ingredients:[["納豆",3,"パック"],["卵",2,"個"]], steps:["卵焼きを作る","味噌汁を用意"]
},
{
  name:"ご飯＋味噌汁＋ウインナー＋ヨーグルト", cost:280,
  ingredients:[["ウインナー",1,"袋"],["ヨーグルト",1,"パック"]], steps:["ウインナーを焼く","味噌汁を用意"]
},
{
  name:"おにぎり＋味噌汁＋ゆで卵", cost:240,
  ingredients:[["卵",3,"個"]], steps:["おにぎりを作る","ゆで卵を作る"]
}
];

function fracText(n){
  if(n===0.25) return "1/4";
  if(n===0.5) return "1/2";
  if(n===0.75) return "3/4";
  return n;
}

function formatAmount(v,u){
  if(u==="g"){
    let amt = Math.ceil(v/100)*100;
    if(amt>=1000) return (amt/1000).toFixed(1)+"kg";
    return amt+"g";
  }
  if(["個","本","株","袋","丁","パック"].includes(u)){
    if(v===0.25 || v===0.5 || v===0.75) return fracText(v)+u;
    return Math.ceil(v)+u;
  }
  return v+u;
}

function addShopping(shopping, ingredients, ratio=1){
  ingredients.forEach(i=>{
    const key = i[0]+"_"+i[2];
    if(!shopping[key]){
      shopping[key] = {name:i[0], amount:0, unit:i[2]};
    }
    shopping[key].amount += i[1]*ratio;
  });
}

function pickDifferent(arr, prevName){
  let list = arr.filter(x=>x.name!==prevName);
  return list[Math.floor(Math.random()*list.length)];
}

function recipeHtml(item){
  return `
    <div class="recipe">
      <div class="small"><b>材料</b></div>
      ${item.ingredients.map(i=>`・${i[0]} ${formatAmount(i[1],i[2])}`).join("<br>")}
      <div class="small" style="margin-top:8px"><b>手順</b></div>
      ${item.steps.map((s,idx)=>`${idx+1}. ${s}`).join("<br>")}
      ${item.storage ? `<div class="small" style="margin-top:8px"><b>保存</b>：${item.storage}</div>` : ""}
      ${item.tip ? `<div class="small"><b>一言</b>：${item.tip}</div>` : ""}
    </div>
  `;
}

function toggleRecipe(btn){
  const rec = btn.nextElementSibling;
  rec.style.display = rec.style.display==="block" ? "none" : "block";
}

function makePlan(){
  const people = Number(document.getElementById("people").value) || 3;
  const bentoPeople = Number(document.getElementById("bentoPeople").value) || 1;
  const monthlyBudget = Number(document.getElementById("monthlyBudget").value) || 0;
  const snackBudget = Number(document.getElementById("snackBudget").value) || 0;
  const ng = document.getElementById("ng").value;

  const filteredMain = mainDB.filter(x=>!x.name.includes(ng));
  const filteredSide = sideDB.filter(x=>!x.name.includes(ng));
  const filteredPrep = prepDB.filter(x=>!x.name.includes(ng));
  const filteredBreakfast = breakfastDB.filter(x=>!x.name.includes(ng));

  let shopping = {};
  let totalCost = 0;

  const weeklyBudget = Math.round((monthlyBudget - snackBudget) / 4.3);

  let prepHtml = `<div class="card"><h3>日曜：作り置き</h3>`;
  filteredPrep.forEach(p=>{
    prepHtml += `✔ ${p.name} <span class="small">(${p.storage})</span><br><span class="small">${p.tip}</span><br>`;
    addShopping(shopping, p.ingredients, 1);
    totalCost += p.cost;
  });
  prepHtml += `</div>`;
  document.getElementById("prep").innerHTML = prepHtml;

  let resultHtml = "";
  let prevMain = "";

  ["月","火","水","木","金"].forEach(day=>{
    let main = pickDifferent(filteredMain, prevMain);
    prevMain = main.name;

    let side1 = filteredSide[Math.floor(Math.random()*filteredSide.length)];
    let side2 = filteredSide.filter(x=>x.name!==side1.name)[Math.floor(Math.random()*(filteredSide.length-1))];
    let breakfast = filteredBreakfast[Math.floor(Math.random()*filteredBreakfast.length)];

    addShopping(shopping, main.ingredients, people/3);
    addShopping(shopping, side1.ingredients, people/3);
    addShopping(shopping, side2.ingredients, people/3);
    addShopping(shopping, breakfast.ingredients, people/3);

    totalCost += main.cost + side1.cost + side2.cost + breakfast.cost;

    resultHtml += `
      <div class="card">
        <h3>${day}</h3>

        <span class="badge info">朝ごはん</span><br>
        ${breakfast.name}
        <button class="recipe-btn" onclick="toggleRecipe(this)">レシピを見る</button>
        ${recipeHtml(breakfast)}

        <br><span class="badge bento">お弁当</span><br>
        主菜：作り置き / 副菜①：${side1.name} / 副菜②：${side2.name} / 彩り：ミニトマト
        <div class="small">お弁当は${bentoPeople}人分想定</div>

        <br><span class="badge main">夕飯 主菜</span><br>
        ${main.name}
        <button class="recipe-btn" onclick="toggleRecipe(this)">レシピを見る</button>
        ${recipeHtml(main)}

        <br><span class="badge side">副菜</span><br>
        ${side1.name} / ${side2.name}
      </div>
    `;
  });
  document.getElementById("result").innerHTML = resultHtml;

  let shoppingHtml = `<div class="card"><h3>土曜：買い物リスト</h3>`;
  Object.keys(shopping).forEach(k=>{
    const s = shopping[k];
    shoppingHtml += `・${s.name} ${formatAmount(s.amount, s.unit)}<br>`;
  });
  shoppingHtml += `</div>`;
  document.getElementById("shopping").innerHTML = shoppingHtml;

  const remain = weeklyBudget - totalCost;
  document.getElementById("summary").innerHTML = `
    <div class="card totalbox">
      <h3>今週の予算</h3>
      週予算目安：${weeklyBudget.toLocaleString()}円<br>
      今週の概算：${totalCost.toLocaleString()}円<br>
      残り目安：${remain.toLocaleString()}円
      <div class="small" style="margin-top:6px">※ 概算です。おやつ予算は月予算から先に引いています。</div>
    </div>
  `;
}

makePlan();
</script>

</body>
</html>
