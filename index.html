<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立予算プランナー Ver6</title>

<style>
body {font-family:sans-serif;background:#f7f7f7;margin:0;padding:10px;}
.card {background:#fff;padding:12px;margin:10px 0;border-radius:10px;}
button {background:#ff7f50;color:#fff;border:none;padding:8px 12px;border-radius:8px;}
.badge {padding:3px 6px;border-radius:6px;font-size:11px;margin-right:4px;}
.green{background:#c8f7c5;}
.blue{background:#c5e3f7;}
.yellow{background:#fff3b0;}
.orange{background:#ffd6a5;}
</style>
</head>

<body>

<h2>献立プランナー Ver6</h2>

<div class="card">
<label>人数</label>
<input id="people" type="number" value="3">

<label>避けたい食材</label>
<input id="ng" placeholder="魚など">

<label>お弁当</label>
<select id="bento">
<option>平日のみ</option>
<option>毎日</option>
<option>なし</option>
</select>

<button onclick="make()">献立作成</button>
</div>

<div id="result"></div>
<div id="shopping"></div>

<script>

// メニューDB（簡易）
const meals = [
 {name:"鶏の照り焼き",cat:"鶏",veg:true,protein:true,ing:[
  {n:"鶏もも肉",a:300,u:"g"},
  {n:"玉ねぎ",a:1,u:"個"}
 ]},

 {name:"豚しょうが焼き",cat:"豚",veg:true,protein:true,ing:[
  {n:"豚肉",a:300,u:"g"},
  {n:"玉ねぎ",a:1,u:"個"}
 ]},

 {name:"麻婆豆腐",cat:"豆腐",veg:false,protein:true,ing:[
  {n:"ひき肉",a:200,u:"g"},
  {n:"豆腐",a:1,u:"丁"}
 ]},

 {name:"ハンバーグ",cat:"牛",veg:false,protein:true,ing:[
  {n:"ひき肉",a:300,u:"g"},
  {n:"玉ねぎ",a:1,u:"個"}
 ]},

 {name:"野菜炒め",cat:"野菜",veg:true,protein:false,ing:[
  {n:"キャベツ",a:0.5,u:"個"},
  {n:"にんじん",a:1,u:"本"}
 ]}
];

function make(){

 const people = Number(document.getElementById("people").value);
 const ng = document.getElementById("ng").value;

 let resultHTML="";
 let shopping = {};

 let prevCat="";

 for(let i=0;i<5;i++){

  let list = meals.filter(m => !m.name.includes(ng) && m.cat!==prevCat);

  let pick = list[Math.floor(Math.random()*list.length)];

  prevCat = pick.cat;

  resultHTML += `<div class="card">
  ${pick.name}<br>
  <span class="badge blue">たんぱく質</span>
  ${pick.veg?'<span class="badge green">野菜</span>':''}
  </div>`;

  // 買い物合算
  pick.ing.forEach(x=>{
    let key = x.n;
    let amount = x.a * people;

    if(!shopping[key]) shopping[key]=0;
    shopping[key]+=amount;
  });

 }

 document.getElementById("result").innerHTML = resultHTML;

 // 買い物リスト表示
 let shopHTML="<div class='card'><b>買い物リスト</b><br>";

 for(let k in shopping){
   shopHTML += `${k} ${shopping[k]}<br>`;
 }

 shopHTML+="</div>";

 document.getElementById("shopping").innerHTML = shopHTML;
}

</script>

</body>
</html>
