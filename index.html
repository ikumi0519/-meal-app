  el.textContent=t;

  tagsBox.appendChild(el);
});

function pickFrom(list){return list[Math.floor(Math.random()*list.length)]}
function activeTagList(){return [...activeTags];}

function score(m){
  let s=Math.random()*0.1;
  activeTagList().forEach(t=>{
    if(m.tags && m.tags.includes(t)) s+=1;
  });
  return s;
}

function pickBest(list){
  if(!list || list.length===0) return null;
  return list.map(x=>({item:x,score:score(x)})).sort((a,b)=>b.score-a.score)[0].item;
}

function filteredMains(){
  const ng=(document.getElementById("ng").value||"").trim();
  let pool=mains.filter(m=>!ng || (!m.name.includes(ng) && !m.ingredients.some(i=>i[0].includes(ng))));
  if(activeTags.has("魚少なめ")){
    pool=pool.filter(m=>m.cat!=="魚");
  }
  return pool.length?pool:[...mains];
}

function pickWeek(){
  let pool=filteredMains();
  let result=[];
  let last=null;

  for(let i=0;i<5;i++){
    let list=pool.filter(m=>!last || (m.cat!==last.cat && m.taste!==last.taste && m.genre!==last.genre));
    if(list.length===0) list=[...pool];
    let pick=pickBest(list);
    if(!pick) break;
    result.push(pick);
    pool=pool.filter(m=>m.name!==pick.name);
    last=pick;
  }
  return result;
}

function pickMonth(){
  let base=filteredMains();
  let result=[];
  let last=null;
  let usedNames=new Set();

  for(let w=0;w<4;w++){
    let week=[];
    for(let d=0;d<7;d++){
      let pool=base.filter(m=>!usedNames.has(m.name));
      if(pool.length===0){
        // メニュー数が28未満の場合だけ、2周目に入る
        usedNames=new Set();
        pool=[...base];
      }

      let list=pool.filter(m=>!last || (m.cat!==last.cat && m.taste!==last.taste && m.genre!==last.genre));
      if(list.length===0) list=[...pool];

      let pick=pickBest(list);
      if(!pick) break;
      week.push(pick);
      usedNames.add(pick.name);
      last=pick;
    }
    result.push(week);
  }
  return result;
}

function pickSides(){
  let pool=[...sideDB];
  let result=[];
  for(let i=0;i<10;i++){
    if(pool.length===0) pool=[...sideDB];
    let pick=pickFrom(pool);
    result.push(pick);
    pool=pool.filter(s=>s.name!==pick.name);
  }
  return result;
}

function addShopping(list,item,people){
  item.ingredients.forEach(i=>{
    let key=i[0]+i[2];
    if(!list[key]) list[key]={name:i[0],amount:0,unit:i[2],cat:i[3]};
    list[key].amount+=i[1]*people;
  });
}

function fmt(n,unit){
  if(unit==="g"){
    let v=Math.ceil(n/100)*100;
    if(v>=1000)return (v/1000).toFixed(1)+"kg";
    return v+"g";
  }
  if(["個","本","丁","株","袋","切"].includes(unit)){
    if(n<=0.5)return "1/2"+unit;
    return Math.ceil(n)+unit;
  }
  if(unit==="大さじ")return Math.round(n*2)/2+"大さじ";
  return n+unit;
}

function toggleRecipe(id){
  let el=document.getElementById(id);
  el.style.display=el.style.display==="block"?"none":"block";
}

function make(){
  document.getElementById("status").textContent="作成中...";
  let people=Number(document.getElementById("people").value)||4;
  let bento=document.getElementById("bento").value;
  let budget=document.getElementById("budget").value;

  let week=pickWeek();
  let month=pickMonth();
  let sides=pickSides();
  let days=["月","火","水","木","金"];
  let shopping={};

  let prepMains=week.filter(m=>m.prep).slice(0,3);
  for(let m of mains){
    if(prepMains.length>=3)break;
    if(m.prep && !prepMains.some(p=>p.name===m.name)) prepMains.push(m);
  }

  let prepSides=sideDB.slice(0,3);

  let html="<div class='card'><h3>日曜作り置き</h3>";
  html+="<span class='badge prep'>主菜</span><br>";
  prepMains.forEach(m=>{
    html+="・"+m.name+"（"+m.save+"）<br>";
    addShopping(shopping,m,people);
  });
  html+="<br><span class='badge side'>副菜</span><br>";
  prepSides.forEach(s=>{
    html+="・"+s.name+"（"+s.save+"）<br>";
    addShopping(shopping,s,people);
  });
  html+="</div>";

  html+="<div class='card'><h3>今週の献立</h3>";

  week.forEach((m,i)=>{
    let s1=sides[i*2];
    let s2=sides[i*2+1];
    addShopping(shopping,m,people);
    addShopping(shopping,s1,people);
    addShopping(shopping,s2,people);

    html+=`
    <b>${days[i]}</b><br>
    <span class="badge bento">弁当</span><br>
    主菜：${prepMains[i%prepMains.length].name}<br>
    副菜：${s1.name} / ${s2.name}（${bento}人）<br><br>
    <span class="badge dinner">夕飯</span><br>
    ${m.name}<br>
    <small>${m.genre} / ${m.taste} / ${m.cat}</small><br>
    <button onclick="toggleRecipe('r${i}')">レシピを見る</button>
    <div id="r${i}" class="recipe">
      <b>材料（${people}人分）</b><br>
      ${m.ingredients.map(x=>"・"+x[0]+" "+fmt(x[1]*people,x[2])).join("<br>")}
      <br><br>
      <b>手順</b><br>
      ${m.steps.map((s,n)=>(n+1)+". "+s).join("<br>")}
      <br><br>
      保存：${m.save}
    </div>
    <br><br>
    `;
  });

  html+=`<hr>週予算：約${Math.round(budget/4)}円</div>`;

  html+="<div class='card'><h3>1ヶ月メニュー</h3>";
  month.forEach((w,i)=>{
    html+="<b>第"+(i+1)+"週</b><br>";
    w.forEach(m=>{
      html+="・"+m.name+"<br>";
    });
    html+="<br>";
  });
  html+="</div>";

  html+="<div class='card'><h3>買い物リスト</h3>";
  ["肉","魚","野菜","卵・豆腐","調味料","その他"].forEach(cat=>{
    let items=Object.values(shopping).filter(x=>x.cat===cat);
    if(items.length){
      html+="<b>"+cat+"</b><br>";
      items.forEach(x=>{
        html+="・"+x.name+" "+fmt(x.amount,x.unit)+"<br>";
      });
      html+="<br>";
    }
  });
  html+="</div>";

  document.getElementById("out").innerHTML=html;
  document.getElementById("status").textContent="作成しました";
}

function savePlan(){
  localStorage.setItem("mealPlannerPracticalV21", document.getElementById("out").innerHTML);
  alert("保存しました");
}

function loadPlan(){
  const saved = localStorage.getItem("mealPlannerPracticalV21");
  if(saved){
    document.getElementById("out").innerHTML = saved;
  }else{
    alert("保存データがありません");
  }
}
</script>
