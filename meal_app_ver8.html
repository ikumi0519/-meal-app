<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>献立プランナー Ver8</title>
<style>
  :root{
    --bg:#f7f5f2; --card:#ffffff; --line:#e7dfd7; --text:#2c2a28; --muted:#7a736c;
    --accent:#e88b5a; --green:#dff3de; --blue:#dfeefd; --yellow:#fff0bf; --pink:#f9ddeb; --orange:#ffe3d1;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
  .wrap{max-width:900px;margin:0 auto;padding:18px 14px 40px}
  h1{font-size:28px;margin:8px 0 16px}
  h2{font-size:22px;margin:24px 0 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
  input,select{width:100%;padding:11px 12px;border:1px solid #d7cec5;border-radius:12px;background:#fff;font-size:16px}
  button{border:none;border-radius:12px;background:var(--accent);color:#fff;padding:12px 16px;font-size:16px;font-weight:700}
  .ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .tagwrap{display:flex;flex-wrap:wrap;gap:8px}
  .tag{padding:8px 12px;border-radius:999px;border:1px solid #dccfc2;background:#fff;color:#5d554d;font-size:14px;cursor:pointer}
  .tag.active{background:#fde7dc;border-color:#f2c0a4;color:#8c4d27}
  .day{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
  .dayhead{font-size:22px;font-weight:800;margin-bottom:10px}
  .mealrow{padding:10px 0;border-top:1px solid #f0ebe6}
  .mealrow:first-of-type{border-top:none;padding-top:0}
  .label{font-size:13px;color:var(--muted);margin-bottom:4px}
  .mealname{font-size:22px;font-weight:800;cursor:pointer}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .badge{font-size:12px;padding:4px 8px;border-radius:999px}
  .g{background:var(--green)} .b{background:var(--blue)} .y{background:var(--yellow)} .p{background:var(--pink)} .o{background:var(--orange)}
  .small{font-size:13px;color:var(--muted)}
  .shopping-group{margin:12px 0}
  .shopping-group h3{margin:0 0 8px;font-size:18px}
  .shopping-item{padding:6px 0;border-bottom:1px dashed #eee;font-size:18px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;padding:0 10px 10px}
  .modal.show{display:flex}
  .sheet{background:#fff;max-width:720px;width:100%;border-radius:18px 18px 14px 14px;padding:16px;max-height:82vh;overflow:auto}
  .recipe-list{padding-left:18px;line-height:1.8}
  @media (max-width:760px){ .grid,.grid3{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <h1>献立プランナー Ver8</h1>

  <div class="card">
    <div class="grid3">
      <div>
        <label>家族人数</label>
        <input id="familyCount" type="number" min="1" value="4">
      </div>
      <div>
        <label>お弁当人数</label>
        <input id="bentoCount" type="number" min="0" value="1">
      </div>
      <div>
        <label>お弁当</label>
        <select id="bentoDays">
          <option value="weekdays">平日のみ</option>
          <option value="everyday">毎日</option>
          <option value="none">なし</option>
        </select>
      </div>
    </div>
    <div class="grid">
      <div>
        <label>避けたい食材</label>
        <input id="ngFoods" placeholder="魚、きのこ など">
      </div>
      <div>
        <label>おやつ頻度</label>
        <select id="snackFreq">
          <option value="0">なし</option>
          <option value="2">週2回</option>
          <option value="3">週3回</option>
          <option value="5">ほぼ毎日</option>
        </select>
      </div>
    </div>
    <div style="margin-top:10px">
      <label>好み</label>
      <div class="tagwrap" id="prefTags"></div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      <button id="generateBtn">献立作成</button>
      <button class="ghost" id="regenBtn" type="button">もう一度作成</button>
    </div>
    <div class="small" style="margin-top:8px">メニュー名をタップすると、材料と作り方の目安が開きます。</div>
  </div>

  <div id="summary"></div>
  <div id="plan"></div>
  <div id="shopping"></div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="small">簡易レシピ</div>
      <button class="ghost" id="closeModal" type="button" style="padding:8px 10px">閉じる</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

const prefTags = document.getElementById('prefTags');

  el.textContent=t.label;
  el.onclick=()=>{ activePrefs.has(t.key)?activePrefs.delete(t.key):activePrefs.add(t.key); el.classList.toggle('active'); };
  prefTags.appendChild(el);
});

function parseNg(){
  return document.getElementById('ngFoods').value.split(/[、,\s]+/).map(s=>s.trim()).filter(Boolean);
}
function isMealAllowed(meal, ngs){
  const text = meal.name + ' ' + (meal.category || '') + ' ' + (meal.ingredients || []).map(i=>i.name).join(' ');
  return !ngs.some(ng => ng && text.includes(ng));
}
function scoreDinner(meal, prefs, prevCats, usedNames, vegUsed, noodleUsed){
  let s = Math.random()*0.4;
  if (usedNames.has(meal.name)) s -= 5;
  if (prevCats.includes(meal.category)) s -= 3;
  if (meal.category==='麺' && noodleUsed >= 1) s -= 3;
  if (meal.tags.includes('veggie') && vegUsed < 3) s += 1.4;
  if (prefs.has('quick') && meal.tags.includes('quick')) s += 1.5;
  if (prefs.has('budget') && meal.tags.includes('budget')) s += 1.3;
  if (prefs.has('kids') && meal.tags.includes('kids')) s += 1.2;
  if (prefs.has('healthy') && meal.tags.includes('healthy')) s += 1.3;
  if (prefs.has('makeahead') && meal.tags.includes('makeahead')) s += 1.2;
  if (prefs.has('hearty') && meal.tags.includes('hearty')) s += 1.1;
  if (prefs.has('veggie') && meal.tags.includes('veggie')) s += 1.5;
  if (meal.nutrition && meal.nutrition.veg) s += 0.5;
  return s;
}
function scaleIngredient(item, factor){ return { ...item, amount: item.amount * factor }; }
function addShopping(map, item){
  const key = item.group + '|' + item.name + '|' + item.unit;
  if(!map[key]) map[key] = {group:item.group, name:item.name, unit:item.unit, amount:0};
  map[key].amount += item.amount;
}

function roundPackLike(amount){ return Math.max(1, Math.ceil(amount)); }
function roundEgg(amount){ return Math.ceil(amount); }
function roundGram(amount){ return Math.ceil(amount / 100) * 100; }
function roundLargeVeg(amount){
  if (amount <= 0.25) return 0.25;
  if (amount <= 0.5) return 0.5;
  if (amount <= 0.75) return 0.75;
  return Math.ceil(amount * 4) / 4;
}
function fmtAmount(amount, unit, name=''){
  const largeVegNames = ['キャベツ','白菜','大根'];
  if (unit === 'g') {
    const g = roundGram(amount);
    if (g >= 1000) return (Math.round(g/100)/10).toFixed(1).replace(/\.0$/,'') + 'kg';
    return g + 'g';
  }
  if (largeVegNames.includes(name) && ['玉','本'].includes(unit)) {
    const v = roundLargeVeg(amount);
    return String(v).replace('.25','1/4').replace('.5','1/2').replace('.75','3/4') + unit;
  }
  if (['個','本','株','袋','パック','玉','丁','片','枚','合'].includes(unit)) {
    const n = (name === '卵') ? roundEgg(amount) : roundPackLike(amount);
    return n + unit;
  }
  if (['大さじ','小さじ'].includes(unit)) return (Math.round(amount*10)/10) + unit;
  return (Math.round(amount*10)/10) + unit;
}

function chooseBreakfast(dayIndex, allowedBreakfast){
  const seq = [0,1,0,1,2,0,3];
  return allowedBreakfast[seq[dayIndex % seq.length] % allowedBreakfast.length];
}
function chooseSnack(used, prefs){
  let list = snackDB.slice();
  if (prefs.has('healthy')) list = list.sort((a,b)=>(b.tags.includes('healthy')?1:0)-(a.tags.includes('healthy')?1:0));
  if (prefs.has('hearty')) list = list.sort((a,b)=>(b.tags.includes('hearty')?1:0)-(a.tags.includes('hearty')?1:0));
  const pick = list.find(x=>!used.has(x.name)) || list[0];
  used.add(pick.name);
  return pick;
}
function bentoEnabled(dayIndex, mode){ if(mode==='none') return false; if(mode==='everyday') return true; return dayIndex < 5; }

function buildPlan(){
  const familyCount = Math.max(1, Number(document.getElementById('familyCount').value)||1);
  const bentoCount = Math.max(0, Number(document.getElementById('bentoCount').value)||0);
  const bentoMode = document.getElementById('bentoDays').value;
  const snackFreq = Number(document.getElementById('snackFreq').value);
  const prefs = new Set(activePrefs);
  const ngs = parseNg();

  const allowedDinners = dinnerDB.filter(m=>isMealAllowed(m, ngs));
  let allowedBreakfast = breakfastDB.filter(m=>isMealAllowed(m, ngs));
  if (!allowedBreakfast.length) allowedBreakfast = breakfastDB.filter(m=>!m.name.includes('しらす'));

  const shoppingMap = {};
  const usedDinnerNames = new Set();
  const usedSnackNames = new Set();
  const prevCats = [];
  const snackDays = new Set([1,4,6,0,3].slice(0, snackFreq));
  recipeIndex = new Map();
  const plan = [];
  let vegUsed = 0;
  let noodleUsed = 0;

  for(let i=0;i<7;i++){
    const breakfast = chooseBreakfast(i, allowedBreakfast);
    const scored = allowedDinners
      .map(m=>({meal:m, score:scoreDinner(m,prefs,prevCats,usedDinnerNames,vegUsed,noodleUsed)}))
      .sort((a,b)=>b.score-a.score);
    const dinner = scored[0]?.meal || dinnerDB[0];

    usedDinnerNames.add(dinner.name);
    prevCats.push(dinner.category);
    if(prevCats.length>2) prevCats.shift();
    if (dinner.nutrition?.veg) vegUsed += 1;
    if (dinner.category === '麺') noodleUsed += 1;

    let bento = null;
    if (bentoEnabled(i, bentoMode) && bentoCount > 0){
      const side1 = bentoSides[(i*2)%bentoSides.length];
      const side2 = bentoSides[(i*2+1)%bentoSides.length];
      bento = {
        name: `${dinner.name}弁当`,
        ingredients:[
          ...dinner.ingredients.map(x=>scaleIngredient(x, (bentoCount / familyCount) * 0.35)),
          ...side1.ingredients.map(x=>scaleIngredient(x, Math.max(1, bentoCount*0.6))),
          ...side2.ingredients.map(x=>scaleIngredient(x, Math.max(1, bentoCount*0.6)))
        ],
        steps:[`前夜の${dinner.name}を少し取り分ける。`, `${side1.name}を用意する。`, `${side2.name}を詰める。`],
        badges:['時短','弁当OK']
      };
    }

    let snack = null;
    if (snackDays.has(i)) snack = chooseSnack(usedSnackNames, prefs);

    plan.push({weekday:weekdays[i], breakfast, dinner, bento, snack});
    breakfast.ingredients.forEach(x=>addShopping(shoppingMap, x));
    dinner.ingredients.forEach(x=>addShopping(shoppingMap, scaleIngredient(x, 1)));
    if (bento) bento.ingredients.forEach(x=>addShopping(shoppingMap, x));
    if (snack) snack.ingredients.forEach(x=>addShopping(shoppingMap, x));
    [breakfast,dinner,bento,snack].filter(Boolean).forEach(item=>recipeIndex.set(item.name, item));
  }

  renderSummary(plan, prefs, ngs, familyCount, bentoCount, bentoMode, snackFreq);
  renderPlan(plan);
  renderShopping(shoppingMap, familyCount);
}

function renderSummary(plan, prefs, ngs, familyCount, bentoCount, bentoMode, snackFreq){
  const vegMeals = plan.filter(d=>d.dinner.nutrition?.veg).length;
  const proteinMeals = plan.filter(d=>d.dinner.nutrition?.protein).length;
  document.getElementById('summary').innerHTML = `
    <div class="card">
      <div class="badges">
        <span class="badge g">野菜 ${vegMeals}/7日</span>
        <span class="badge b">たんぱく質 ${proteinMeals}/7日</span>
        <span class="badge y">家族 ${familyCount}人</span>
        <span class="badge o">弁当 ${bentoMode==='none'?'なし':(bentoMode==='weekdays'?'平日のみ':'毎日')} ${bentoCount}人</span>
        ${snackFreq?`<span class="badge p">おやつ ${snackFreq===5?'ほぼ毎日':'週'+snackFreq+'回'}</span>`:''}
      </div>
      <div class="small" style="margin-top:8px">避けたい食材: ${ngs.length?ngs.join('、'):'なし'} ／ 好み: ${[...prefs].map(k=>TAGS.find(t=>t.key===k)?.label).filter(Boolean).join('、')||'指定なし'}</div>
    </div>`;
}
function badgeHTML(list){
  return `<div class="badges">${(list||[]).map(b=>{
    let cls='b';
    if(['野菜','野菜多め','ヘルシー'].includes(b)) cls='g';
    else if(['時短','定番'].includes(b)) cls='y';
    else if(['がっつり','弁当OK'].includes(b)) cls='o';
    else if(['子ども向け','彩り','発酵食品'].includes(b)) cls='p';
    return `<span class="badge ${cls}">${b}</span>`;
  }).join('')}</div>`;
}
function mealRow(title, item){
  if(!item) return '';
  return `<div class="mealrow">
    <div class="label">${title}</div>
    <div class="mealname" data-recipe="${item.name.replaceAll('"','&quot;')}">${item.name}</div>
    ${badgeHTML(item.badges)}
  </div>`;
}
function renderPlan(plan){
  document.getElementById('plan').innerHTML = `<h2>1週間の献立</h2>` + plan.map(d=>`
    <div class="day">
      <div class="dayhead">${d.weekday}</div>
      ${mealRow('朝ごはん', d.breakfast)}
      ${mealRow('お弁当', d.bento)}
      ${mealRow('夜ごはん', d.dinner)}
      ${mealRow('おやつ', d.snack)}
    </div>`).join('');
  document.querySelectorAll('[data-recipe]').forEach(el=>{ el.onclick=()=>showRecipe(el.getAttribute('data-recipe')); });
}
function renderShopping(shoppingMap, familyCount){
  const order = ['野菜','肉','卵','豆腐','主食','朝食','おやつ','冷凍','調味料'];
  const items = Object.values(shoppingMap).sort((a,b)=>order.indexOf(a.group)-order.indexOf(b.group)||a.name.localeCompare(b.name,'ja'));
  let html = '<h2>買い物リスト</h2><div class="card">';
  order.forEach(group=>{
    const rows = items.filter(x=>x.group===group);
    if(!rows.length) return;
    html += `<div class="shopping-group"><h3>${group}</h3>` + rows.map(r=>`<div class="shopping-item">${r.name} ${fmtAmount(r.amount,r.unit,r.name)}</div>`).join('') + '</div>';
  });
  html += `<div class="small">表示は買い物しやすい単位に丸めています。大型野菜は 1/4玉・1/2玉 単位です。</div></div>`;
  document.getElementById('shopping').innerHTML = html;
}
function showRecipe(name){
  const item = recipeIndex.get(name); if(!item) return;
  document.getElementById('modalBody').innerHTML = `
    <h3 style="margin:4px 0 10px;font-size:24px">${item.name}</h3>
    ${badgeHTML(item.badges)}
    <div style="margin-top:10px"><b>材料</b></div>
    <ul class="recipe-list">${(item.ingredients||[]).map(i=>`<li>${i.name} ${fmtAmount(i.amount,i.unit,i.name)}</li>`).join('')}</ul>
    <div style="margin-top:10px"><b>作り方の目安</b></div>
    <ol class="recipe-list">${(item.steps||[]).map(s=>`<li>${s}</li>`).join('')}</ol>`;
  document.getElementById('modal').classList.add('show');
}

document.getElementById('closeModal').onclick=()=>document.getElementById('modal').classList.remove('show');
document.getElementById('modal').onclick=(e)=>{ if(e.target.id==='modal') document.getElementById('modal').classList.remove('show'); };
document.getElementById('generateBtn').onclick=buildPlan;
document.getElementById('regenBtn').onclick=buildPlan;
buildPlan();
</script>
